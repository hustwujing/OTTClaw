<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多屏工具箱</title>
<script src="/marked.min.js"></script>
<style>
/* ── Reset & Variables ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #ffffff;
  --bg2:         #f8fafc;
  --bg3:         #f1f5f9;
  --border:      #e2e8f0;
  --text:        #0f172a;
  --muted:       #64748b;
  --primary:     #2563eb;
  --primary-h:   #1d4ed8;
  --user-bg:     #2563eb;
  --user-text:   #ffffff;
  --ai-bg:       #f1f5f9;
  --ai-text:     #0f172a;
  --err-bg:      #fee2e2;
  --err-text:    #991b1b;
  --ok-bg:       #dcfce7;
  --ok-text:     #166534;
  --r:           12px;
  --r-sm:        8px;
  --shadow:      0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 12px rgba(0,0,0,.1);
  --sidebar-w:   220px;
}
[data-theme="dark"] {
  --bg:          #0f172a;
  --bg2:         #1e293b;
  --bg3:         #293548;
  --border:      #334155;
  --text:        #f1f5f9;
  --muted:       #94a3b8;
  --primary:     #3b82f6;
  --primary-h:   #2563eb;
  --user-bg:     #3b82f6;
  --ai-bg:       #1e293b;
  --ai-text:     #f1f5f9;
  --err-bg:      #450a0a;
  --err-text:    #fca5a5;
  --ok-bg:       #052e16;
  --ok-text:     #86efac;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Overlay / Modal ─────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.overlay.hidden { display: none !important; }
.modal {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: min(460px, calc(100vw - 32px));
  box-shadow: var(--shadow-md);
}
.modal h2 {
  font-size: 1.125rem; font-weight: 700;
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 8px;
}

/* ── Form ────────────────────────────────────────────────────────── */
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: .8125rem; font-weight: 500;
  color: var(--muted); margin-bottom: 5px;
}
.field input {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--bg3); color: var(--text);
  font-size: .9375rem; outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--primary); }

.field-hint { font-size: .75rem; color: var(--muted); margin-top: 4px; }
.form-err {
  font-size: .8125rem; color: var(--err-text);
  background: var(--err-bg); border-radius: var(--r-sm);
  padding: 8px 12px; margin-top: 12px;
  display: none;
}
.modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border: none; border-radius: var(--r-sm);
  font-size: .9375rem; font-weight: 500; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-h); }
.btn-ghost {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover:not(:disabled) { background: var(--bg3); color: var(--text); }
.btn-green { background: #22c55e; color: #fff; }
.btn-green:hover:not(:disabled) { background: #16a34a; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* ── Header ──────────────────────────────────────────────────────── */
header {
  height: 54px; padding: 0 16px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  z-index: 10;
}
.h-title {
  flex: 1; font-size: .9375rem; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); transition: background .3s;
  flex-shrink: 0;
}
.dot.on { background: #22c55e; }
.session-label {
  font-size: .75rem; font-weight: 400; color: var(--muted);
  background: var(--bg3); border-radius: 4px; padding: 2px 6px;
}
.h-actions { display: flex; gap: 2px; }
.icon-btn {
  width: 34px; height: 34px;
  border: none; border-radius: var(--r-sm);
  background: transparent; color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.icon-btn:hover { background: var(--bg3); color: var(--text); }

/* ── Main layout ─────────────────────────────────────────────────── */
.main-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg2);
  overflow: hidden;
  transition: width .2s ease, opacity .15s ease;
}
#app[data-sidebar="closed"] .sidebar {
  width: 0;
  opacity: 0;
  pointer-events: none;
}
.sidebar-head {
  display: flex;
  align-items: center;
  padding: 10px 8px 10px 14px;
  border-bottom: 1px solid var(--border);
  gap: 4px;
  flex-shrink: 0;
}
.sidebar-title {
  flex: 1;
  font-size: .7rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.sess-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.sess-list::-webkit-scrollbar { width: 3px; }
.sess-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sess-item {
  position: relative;
  padding: 7px 28px 7px 12px;
  cursor: pointer;
  border-radius: 7px;
  margin: 1px 5px;
  transition: background .1s;
  min-width: 0;
}
.sess-item:hover { background: var(--bg3); }
.sess-del {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: none; cursor: pointer; padding: 0;
  color: var(--muted); border-radius: 4px;
  opacity: 0; transition: opacity .15s, background .1s, color .1s;
}
.sess-item:hover .sess-del { opacity: 1; }
.sess-del:hover { background: rgba(239,68,68,.12); color: #ef4444; }
.sess-item.active {
  background: color-mix(in srgb, var(--primary) 12%, transparent);
}
.sess-prev {
  font-size: .8rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}
.sess-time {
  font-size: .68rem;
  color: var(--muted);
  margin-top: 2px;
}
.sess-empty {
  padding: 24px 14px;
  text-align: center;
  color: var(--muted);
  font-size: .8125rem;
}
.sidebar-foot {
  padding: 8px 14px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  font-size: .68rem; color: var(--muted);
  display: flex; flex-direction: column; gap: 3px;
}
.tok-row {
  display: flex; align-items: center; justify-content: space-between;
}
.tok-val {
  font-variant-numeric: tabular-nums;
  font-weight: 600; color: var(--text);
  font-size: .75rem;
}

/* ── Chat column ─────────────────────────────────────────────────── */
.chat-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Messages area ───────────────────────────────────────────────── */
#msgs {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 14px;
}
#msgs::-webkit-scrollbar { width: 4px; }
#msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* drag-over highlight */
#msgs.drag-over { background: color-mix(in srgb, var(--primary) 6%, var(--bg)); }

.row {
  display: flex; gap: 8px;
  width: 100%;
}
.row.user { flex-direction: row-reverse; align-self: flex-end; }
.row.ai   { align-self: flex-start; }
.row.ai   .msg-body { flex: 1; min-width: 0; }
.row.user .msg-body { flex: 1; min-width: 0; }

.avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .6875rem; font-weight: 700; letter-spacing: -.3px;
  margin-top: 18px;
}
.avatar.user { background: var(--user-bg); color: #fff; }
.avatar.ai   { background: var(--bg3); color: var(--muted); }

.msg-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.msg-body.user { align-items: flex-end; }

.speaker {
  font-size: .72rem; color: var(--muted);
  padding: 0 3px; user-select: none;
}

.bubble {
  padding: 10px 14px; border-radius: var(--r);
  line-height: 1.65; word-break: break-word;
  box-shadow: var(--shadow);
}
.bubble.user {
  background: var(--user-bg); color: var(--user-text);
  border-bottom-right-radius: 3px;
  white-space: pre-wrap;
  max-width: 75%;
}
.bubble.ai {
  background: var(--ai-bg); color: var(--ai-text);
  border-bottom-left-radius: 3px;
  align-self: flex-start;
  max-width: 100%;
}

/* Markdown inside AI bubble */
.bubble-text p { margin: 0 0 .5em; }
.bubble-text p:last-child { margin-bottom: 0; }
.bubble-text pre {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 10px 12px;
  overflow-x: auto; font-size: .83em; margin: .5em 0;
}
.bubble-text code:not(pre code) {
  background: var(--bg2); padding: 1px 5px;
  border-radius: 4px; font-size: .85em;
}
.bubble-text ul, .bubble-text ol { padding-left: 1.2em; margin: .4em 0; }
.bubble-text li { margin-bottom: .2em; }
.bubble-text h1,.bubble-text h2,.bubble-text h3 {
  font-size: 1em; font-weight: 700; margin: .5em 0 .25em;
}
.bubble-text blockquote {
  border-left: 3px solid var(--border); padding-left: 10px;
  color: var(--muted); margin: .4em 0;
}
.bubble-text a { color: var(--primary); text-decoration: underline; }
.bubble-text table { border-collapse: collapse; width: 100%; margin: .5em 0; font-size: .875em; }
.bubble-text th,.bubble-text td { border: 1px solid var(--border); padding: 5px 10px; }
.bubble-text th { background: var(--bg2); font-weight: 600; }

/* typing dots */
.typing { display: flex; gap: 4px; padding: 3px 2px; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.3s ease infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* ── LLM 进度消息（始终可见，显示在气泡内） ──────────────────────── */
.status-line {
  display: flex; align-items: baseline; gap: 6px;
  padding: 2px 0; margin-bottom: 2px;
  font-size: .8125rem; color: var(--muted);
  font-style: italic;
}
.status-line .step-icon { flex-shrink: 0; }
.status-line .step-name { flex-shrink: 0; font-style: normal; opacity: .7; }
.status-line .status-text { color: var(--text); }

/* ── 执行过程面板 ─────────────────────────────────────────────────── */
.proc-log {
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  font-size: .78rem;
}
.proc-log.hidden { display: none; }
.proc-summary {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: var(--bg2);
  cursor: pointer;
  user-select: none;
  list-style: none;
  color: var(--muted);
}
.proc-summary::-webkit-details-marker { display: none; }
.proc-summary:hover { background: var(--bg3); }
.proc-chevron {
  margin-left: auto; font-size: .65rem; color: var(--muted);
  transition: transform .15s;
}
details[open] .proc-chevron { transform: rotate(90deg); }
.proc-count {
  background: var(--bg3); border-radius: 4px;
  padding: 0 5px; font-size: .7rem; color: var(--muted);
}
.proc-steps { padding: 2px 0; }
.proc-step {
  display: flex; align-items: baseline; gap: 7px;
  padding: 3px 10px; line-height: 1.5;
}
.proc-step:hover { background: color-mix(in srgb, var(--border) 30%, transparent); }
.step-icon { font-size: .75rem; flex-shrink: 0; width: 14px; text-align: center; }
.step-name { color: var(--muted); flex-shrink: 0; }
.step-detail { color: var(--text); flex: 1; word-break: break-all; }
.step-ms { color: var(--muted); font-size: .7rem; flex-shrink: 0; }
.sa-text-output { padding: 2px 10px 8px; }
.notify-divider { border: none; border-top: 1px dashed var(--border); margin: 10px 0 8px; }
.notify-append-wrap { padding-top: 2px; }
/* 子任务等待进度条 */
.sa-wait-widget {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 11px; margin-top: 8px;
  border-radius: var(--r-sm);
  background: color-mix(in srgb, var(--primary) 6%, transparent);
  border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
  font-size: .84rem; color: var(--muted);
}
.sa-wait-widget .spinner { color: var(--primary); width: 11px; height: 11px; flex-shrink: 0; }
.sa-wait-counter { color: var(--primary); font-weight: 600; font-feature-settings: 'tnum'; }
/* icon colors */
.c-amber { color: #f59e0b; }
.c-green { color: #22c55e; }
.c-red   { color: #ef4444; }
.c-blue  { color: #3b82f6; }
.c-gray  { color: var(--muted); }
/* ── 子 agent 折叠进度卡片 ──────────────────────────────────────────── */
.subagent-row { padding: 2px 0 2px 2px; }
.subagent-card { width: 100%; }
/* sa-info 包裹任务标题 + 进度提示，撑满 summary 剩余宽度，标题与进度同行显示 */
.sa-info { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: row; align-items: baseline; }
.sa-task-desc {
  flex-shrink: 0; max-width: 50%;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  color: var(--text);
}
/* 进度提示：与标题同行，JS 控制显隐；·分隔符通过 ::before 自动插入 */
.sa-progress-hint {
  flex: 1; min-width: 0;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  color: var(--muted); font-size: .9em;
  display: none;
}
.sa-progress-hint::before { content: ' · '; }
.sa-elapsed { color: var(--muted); font-size: .7rem; flex-shrink: 0; }
.subagent-card.sa-done .proc-summary { opacity: .7; }
.subagent-card.sa-failed .proc-summary { opacity: .7; }
.sa-status-icon { flex-shrink: 0; width: 14px; text-align: center; }
/* report_task_progress 里程碑行：左侧蓝色竖线 + 浅蓝背景，与工具步骤行视觉区分 */
.sa-report-progress {
  background: color-mix(in srgb, var(--primary) 6%, transparent);
  border-left: 2px solid var(--primary);
  padding-left: 6px;
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-style: italic;
}
.sa-report-progress .step-detail { color: var(--primary); }
/* ── 等待状态动画 ───────────────────────────────────────────────── */
@keyframes spin      { to { transform: rotate(360deg); } }
@keyframes fade-dots { 0%,100%{ opacity:.25 } 50%{ opacity:1 } }
.spinner {
  display: inline-block; width: 10px; height: 10px;
  border: 1.5px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .8s linear infinite;
  vertical-align: -1px;
}
.step-pending .step-detail { opacity: .75; }
.step-pending .step-detail::after {
  content: ' …'; animation: fade-dots 1.4s ease-in-out infinite;
}

/* interactive */
.ia-wrap { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.ia-title { font-size: .8125rem; font-weight: 500; color: var(--muted); }
.opts-list { display: flex; flex-direction: column; gap: 5px; }
.opt-btn {
  padding: 8px 12px; text-align: left;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--bg); color: var(--text);
  cursor: pointer; font-size: .9rem; transition: all .15s;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--primary); color: var(--primary);
  background: color-mix(in srgb, var(--primary) 7%, transparent);
}
.opt-btn:disabled { opacity: .5; cursor: default; }
.opt-btn.chosen {
  border-color: var(--primary); color: var(--primary);
  background: color-mix(in srgb, var(--primary) 7%, transparent);
}
.cfm-msg { font-size: .9rem; margin-bottom: 6px; }
.cfm-btns { display: flex; gap: 6px; }
.upld-prompt { font-size: .85rem; color: var(--muted); margin-bottom: 2px; }
.upld-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.upld-preview { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; display: none; flex-shrink: 0; }
.avatar.ai.has-img { background-size: cover; background-position: center; color: transparent; font-size: 0; }

/* error pill */
.err-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--r-sm);
  background: var(--err-bg); color: var(--err-text);
  font-size: .8125rem;
}

/* ── Input bar ───────────────────────────────────────────────────── */
footer {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.input-bar {
  display: flex; align-items: flex-end; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r); padding: 7px 7px 7px 12px;
  transition: border-color .15s;
}
.input-bar:focus-within { border-color: var(--primary); }
#ta {
  flex: 1; border: none; background: transparent; color: var(--text);
  font-size: .9375rem; line-height: 1.5; resize: none; outline: none;
  min-height: 22px; max-height: 160px; overflow-y: auto;
  font-family: inherit;
}
#ta::placeholder { color: var(--muted); }
#ta::-webkit-scrollbar { width: 3px; }
#ta::-webkit-scrollbar-thumb { background: var(--border); }
.send-btn {
  width: 34px; height: 34px; flex-shrink: 0;
  border: none; border-radius: var(--r-sm);
  background: var(--primary); color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.send-btn:hover:not(:disabled) { background: var(--primary-h); }
.send-btn:disabled { opacity: .45; cursor: not-allowed; }
.stop-btn {
  width: 34px; height: 34px; flex-shrink: 0;
  border: none; border-radius: var(--r-sm);
  background: #ef4444; color: #fff;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  transition: background .15s;
}
.stop-btn:hover { background: #dc2626; }
.queue-bar {
  display: none; align-items: center; gap: 4px;
  font-size: .75rem; color: var(--muted); padding: 3px 4px 0;
}
.queue-bar.visible { display: flex; }
.queue-bar-text { flex: 1; }
.queue-clear-btn {
  background: none; border: none; cursor: pointer; padding: 0 3px;
  color: var(--muted); line-height: 1; font-size: .7rem; border-radius: 3px;
}
.queue-clear-btn:hover { color: var(--text); background: var(--bg3); }
.bubble.user.queued { opacity: 0.5; }
.queued-label {
  font-size: .68rem; color: var(--muted);
  text-align: right; padding-right: 2px; margin-top: -1px;
}

/* ── Toast ───────────────────────────────────────────────────────── */
#toasts {
  position: fixed; bottom: 72px; right: 16px;
  display: flex; flex-direction: column; gap: 6px; z-index: 200;
  pointer-events: none;
}
.toast {
  padding: 9px 14px; border-radius: var(--r-sm); font-size: .8125rem;
  box-shadow: var(--shadow-md); pointer-events: auto;
  animation: slide-in .18s ease;
}
.toast.ok  { background: var(--ok-bg);  color: var(--ok-text);  }
.toast.err { background: var(--err-bg); color: var(--err-text); }
@keyframes slide-in {
  from { transform: translateX(110%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ── App layout ──────────────────────────────────────────────────── */
#app { display: none; flex-direction: column; height: 100dvh; width: 100%; min-width: 0; }
#app.active { display: flex; }
.hidden { display: none !important; }

/* ── Mobile ──────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  /* Sidebar: overlay mode */
  #app[data-sidebar="open"] .sidebar {
    position: absolute; top: 54px; left: 0; bottom: 0;
    z-index: 50; width: var(--sidebar-w);
    box-shadow: var(--shadow-md);
    opacity: 1; pointer-events: auto;
  }
  .chat-col { width: 100%; }
  #msgs  { padding: 14px 10px; }
  footer { padding: 8px 10px 12px; }
  .bubble.user { max-width: calc(100vw - 72px); }

  /* Larger tap targets (iOS recommends ≥ 44px) */
  .icon-btn  { width: 40px; height: 40px; }
  .send-btn,
  .stop-btn  { width: 40px; height: 40px; border-radius: 10px; }

  /* Prevent iOS double-tap zoom on buttons */
  button { touch-action: manipulation; }

  /* Prevent iOS input zoom (font-size < 16px triggers auto-zoom) */
  #ta           { font-size: 1rem; }
  .field input  { font-size: 1rem; }

  /* Markdown table: horizontal scroll */
  .bubble-text table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Responsive inline images */
  .msg-img,
  .bubble-text img { max-width: min(400px, calc(100vw - 96px)); max-height: 360px; }

  /* Larger option / confirm buttons */
  .opt-btn  { padding: 11px 14px; font-size: .95rem; }
  .cfm-btns .btn { flex: 1; justify-content: center; }

  /* Session list: bigger touch area per row */
  .sess-item { padding: 10px 32px 10px 12px; }
}

/* ── Sidebar backdrop (mobile only: tapping closes sidebar) ──────── */
#sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 49;
  -webkit-tap-highlight-color: transparent;
}
@media (max-width: 640px) {
  #app[data-sidebar="open"] ~ #sidebar-backdrop { display: block; }
}

/* ── iOS safe-area: home-bar clearance ───────────────────────────── */
@supports (padding: env(safe-area-inset-bottom)) {
  footer {
    padding-bottom: max(14px, calc(8px + env(safe-area-inset-bottom)));
  }
  @media (max-width: 640px) {
    footer {
      padding-bottom: max(12px, calc(6px + env(safe-area-inset-bottom)));
    }
  }
}

/* ── Inline images ───────────────────────────────────────────────── */
.msg-img, .bubble-text img {
  max-width: min(520px, calc(100vw - 96px));
  max-height: 480px;
  border-radius: var(--r-sm);
  display: block;
  margin: 4px 0;
  object-fit: contain;
  cursor: zoom-in;
  background: var(--bg3);
}
.file-ref {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px;
  background: rgba(0,0,0,.06);
  border-radius: var(--r-sm);
  font-size: .8125rem;
  color: inherit;
  text-decoration: none;
}

/* ── Cron History Panel ──────────────────────────────────────────── */
.hist-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: flex-start; justify-content: flex-end;
  z-index: 100;
  backdrop-filter: blur(2px);
}
.hist-overlay.hidden { display: none !important; }
.hist-panel {
  background: var(--bg);
  width: min(680px, 100vw);
  height: 100dvh;
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-md);
}
.hist-head {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.hist-head h2 { font-size: 1rem; font-weight: 700; flex: 1; margin: 0; }
.hist-filter {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.hist-filter input {
  flex: 1; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--bg3); color: var(--text);
  font-size: .875rem; outline: none; transition: border-color .15s;
}
.hist-filter input:focus { border-color: var(--primary); }
.hist-table-wrap {
  flex: 1; overflow-y: auto; overflow-x: auto;
}
.hist-table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.hist-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.hist-table {
  width: 100%; border-collapse: collapse;
  font-size: .8125rem;
}
.hist-table th, .hist-table td {
  padding: 8px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.hist-table th {
  background: var(--bg2); font-weight: 600; color: var(--muted);
  font-size: .75rem; text-transform: uppercase; letter-spacing: .04em;
  position: sticky; top: 0; z-index: 1;
}
.hist-table tr:hover td { background: color-mix(in srgb, var(--border) 20%, transparent); }
.hist-badge {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: .72rem; font-weight: 600;
}
.hist-badge.running   { background: #dbeafe; color: #1d4ed8; }
.hist-badge.succeeded { background: var(--ok-bg); color: var(--ok-text); }
.hist-badge.failed    { background: var(--err-bg); color: var(--err-text); }
.hist-badge.timed_out { background: #fef3c7; color: #92400e; }
[data-theme="dark"] .hist-badge.running   { background: #1e3a5f; color: #93c5fd; }
[data-theme="dark"] .hist-badge.timed_out { background: #451a03; color: #fcd34d; }
.hist-err-cell {
  max-width: 200px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  color: var(--muted); font-size: .75rem;
}
.hist-empty {
  padding: 48px 16px; text-align: center;
  color: var(--muted); font-size: .875rem;
}
.hist-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; flex-wrap: wrap; gap: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.hist-foot-info { font-size: .8125rem; color: var(--muted); }
.hist-page-btns { display: flex; align-items: center; gap: 6px; }
.hist-page-num  { font-size: .8125rem; color: var(--muted); min-width: 56px; text-align: center; }
.hist-actions { display: flex; gap: 4px; flex-wrap: nowrap; }
.hist-act-btn {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 5px;
  font-size: .72rem; font-weight: 500; cursor: pointer;
  border: 1px solid currentColor; background: transparent;
  transition: all .15s; white-space: nowrap; line-height: 1.5;
  font-family: inherit;
}
.hist-act-btn:disabled { opacity: .35; cursor: not-allowed; }
.hist-act-btn.cancel { color: var(--muted); }
.hist-act-btn.cancel:hover:not(:disabled) { background: var(--bg3); color: var(--text); }
.hist-act-btn.kill   { color: #ef4444; }
.hist-act-btn.kill:hover:not(:disabled)   { background: rgba(239,68,68,.09); }
.hist-act-btn.run    { color: #16a34a; }
.hist-act-btn.run:hover:not(:disabled)    { background: rgba(34,197,94,.09); }
.hist-act-btn.remove { color: #ef4444; }
.hist-act-btn.remove:hover:not(:disabled) { background: rgba(239,68,68,.09); }
[data-theme="dark"] .hist-act-btn.run { color: #4ade80; }

/* ── Stats Panel ─────────────────────────────────────────────────── */
.stats-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: flex-start; justify-content: flex-end;
  z-index: 100;
  backdrop-filter: blur(2px);
}
.stats-overlay.hidden { display: none !important; }
.stats-panel {
  background: var(--bg);
  width: min(520px, 100vw);
  height: 100dvh;
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-md);
}
.stats-head {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stats-head h2 { font-size: 1rem; font-weight: 700; flex: 1; margin: 0; }
.stats-cards {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 10px; padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stats-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 10px 8px;
  text-align: center;
}
.stats-card-val {
  font-size: 1.375rem; font-weight: 700; line-height: 1;
}
.stats-card-lbl {
  font-size: .7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: .04em; color: var(--muted); margin-top: 5px;
}
.stats-card.total    .stats-card-val { color: var(--primary); }
.stats-card.web      .stats-card-val { color: #7c3aed; }
.stats-card.feishu   .stats-card-val { color: #0369a1; }
.stats-card.cron     .stats-card-val { color: #d97706; }
.stats-card.subagent .stats-card-val { color: #16a34a; }
.stats-table-wrap { flex: 1; overflow-y: auto; overflow-x: auto; }
.stats-table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
.stats-table th, .stats-table td {
  padding: 8px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.stats-table th {
  background: var(--bg2); font-weight: 600; color: var(--muted);
  font-size: .75rem; text-transform: uppercase; letter-spacing: .04em;
  position: sticky; top: 0; z-index: 1;
}
.stats-table tr:hover td { background: color-mix(in srgb, var(--border) 20%, transparent); }
.stats-empty {
  padding: 48px 16px; text-align: center;
  color: var(--muted); font-size: .875rem;
}
.rt-badge {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: .72rem; font-weight: 600;
}
.rt-badge.web      { background: #ede9fe; color: #7c3aed; }
.rt-badge.feishu   { background: #e0f2fe; color: #0369a1; }
.rt-badge.cron     { background: #fef3c7; color: #d97706; }
.rt-badge.subagent { background: #dcfce7; color: #16a34a; }
[data-theme="dark"] .rt-badge.web      { background: #2e1065; color: #c4b5fd; }
[data-theme="dark"] .rt-badge.feishu   { background: #0c4a6e; color: #7dd3fc; }
[data-theme="dark"] .rt-badge.cron     { background: #451a03; color: #fcd34d; }
[data-theme="dark"] .rt-badge.subagent { background: #052e16; color: #86efac; }
.stats-btn-wrap { position: relative; display: inline-flex; }
.stats-count-badge {
  position: absolute; top: -3px; right: -4px;
  min-width: 14px; height: 14px; padding: 0 3px;
  background: #7c3aed; color: #fff;
  border-radius: 7px; font-size: .6rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; line-height: 1;
}
.stats-count-badge.hidden { display: none; }
.stats-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.stats-last-updated { font-size: .8125rem; color: var(--muted); }
</style>
</head>
<body>

<!-- ══ Settings Modal ════════════════════════════════════════════════ -->
<div id="overlay" class="overlay">
  <div class="modal">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/>
      </svg>
      连接配置
    </h2>
    <div class="field">
      <label>邀请码</label>
      <input id="f-code" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false" style="letter-spacing:.08em;font-family:monospace,monospace" />
    </div>
    <div id="form-err" class="form-err"></div>
    <div class="modal-foot">
      <button id="btn-cancel" class="btn btn-ghost hidden">取消</button>
      <button id="btn-connect" class="btn btn-primary">连接</button>
    </div>
  </div>
</div>

<!-- ══ App ═══════════════════════════════════════════════════════════ -->
<div id="app">

  <header>
    <!-- Sidebar toggle -->
    <button class="icon-btn" id="btn-sidebar" title="历史会话">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
    <div class="h-title">
      <div class="dot" id="dot"></div>
      <span id="app-name">多屏工具箱</span>
      <span class="session-label hidden" id="sess-badge"></span>
    </div>
    <div class="h-actions">
      <!-- New session -->
      <button class="icon-btn" id="btn-new" title="新建会话">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <!-- Cron history -->
      <button class="icon-btn" id="btn-hist" title="定时任务历史">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <!-- Running stats -->
      <div class="stats-btn-wrap">
        <button class="icon-btn" id="btn-stats" title="实时运行统计">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </button>
        <span id="stats-count-badge" class="stats-count-badge hidden">0</span>
      </div>
      <!-- Dark mode -->
      <button class="icon-btn" id="btn-theme" title="切换主题">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <!-- Settings -->
      <button class="icon-btn" id="btn-settings" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="main-body">

    <!-- ── Sidebar ──────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">历史对话</span>
        <button class="icon-btn" id="btn-new-s" title="新建会话" style="width:28px;height:28px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
      <div id="sess-list" class="sess-list"></div>
      <div class="sidebar-foot">
        <div class="tok-row"><span>输入 Token</span><span id="tok-in" class="tok-val">—</span></div>
        <div class="tok-row"><span>输出 Token</span><span id="tok-out" class="tok-val">—</span></div>
      </div>
    </aside>

    <!-- ── Chat column ──────────────────────────────────────────────── -->
    <div class="chat-col">
      <div id="msgs"></div>

      <footer>
        <input type="file" id="file-input" style="display:none" multiple />
        <div class="input-bar">
          <button class="icon-btn" id="btn-upload" title="上传文件 (或拖放到聊天区)" style="flex-shrink:0;margin-bottom:1px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <textarea id="ta" placeholder="输入消息，Shift+Enter 换行…" rows="1"></textarea>
          <button class="send-btn" id="btn-send" title="发送 (Enter)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
          <button class="stop-btn" id="btn-stop" title="停止生成">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </button>
        </div>
        <div class="queue-bar" id="queue-bar">
          <span class="queue-bar-text" id="queue-bar-text"></span>
          <button class="queue-clear-btn" id="queue-clear" title="清空排队消息">✕ 清空</button>
        </div>
      </footer>
    </div>
  </div>
</div>

<!-- sidebar backdrop: tapping closes the sidebar on mobile -->
<div id="sidebar-backdrop"></div>

<div id="toasts"></div>

<!-- ══ Cron History Panel ════════════════════════════════════════════ -->
<div id="hist-overlay" class="hist-overlay hidden">
  <div class="hist-panel">
    <div class="hist-head">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <h2>定时任务执行历史</h2>
      <button class="icon-btn" id="btn-hist-close" title="关闭">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="hist-filter">
      <input id="hist-q" type="text" placeholder="搜索任务名称…" autocomplete="off" />
      <button class="btn btn-ghost" id="btn-hist-refresh" style="flex-shrink:0">刷新</button>
    </div>
    <div class="hist-table-wrap">
      <table class="hist-table">
        <thead>
          <tr>
            <th>任务名称</th>
            <th>状态</th>
            <th>开始时间</th>
            <th>耗时</th>
            <th>错误信息</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="hist-tbody"></tbody>
      </table>
      <div id="hist-empty" class="hist-empty hidden">暂无历史记录</div>
    </div>
    <div class="hist-foot">
      <span class="hist-foot-info" id="hist-total-text"></span>
      <div class="hist-page-btns">
        <button class="btn btn-ghost" id="btn-hist-prev" style="padding:6px 12px">上一页</button>
        <span class="hist-page-num" id="hist-page-num"></span>
        <button class="btn btn-ghost" id="btn-hist-next" style="padding:6px 12px">下一页</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ Stats Panel ═══════════════════════════════════════════════════ -->
<div id="stats-overlay" class="stats-overlay hidden">
  <div class="stats-panel">
    <div class="stats-head">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <h2>实时运行统计</h2>
      <button class="icon-btn" id="btn-stats-close" title="关闭">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="stats-cards">
      <div class="stats-card total">
        <div class="stats-card-val" id="stats-total">0</div>
        <div class="stats-card-lbl">总计</div>
      </div>
      <div class="stats-card web">
        <div class="stats-card-val" id="stats-web">0</div>
        <div class="stats-card-lbl">Web</div>
      </div>
      <div class="stats-card feishu">
        <div class="stats-card-val" id="stats-feishu">0</div>
        <div class="stats-card-lbl">飞书</div>
      </div>
      <div class="stats-card cron">
        <div class="stats-card-val" id="stats-cron">0</div>
        <div class="stats-card-lbl">Cron</div>
      </div>
      <div class="stats-card subagent">
        <div class="stats-card-val" id="stats-sub">0</div>
        <div class="stats-card-lbl">子 Agent</div>
      </div>
    </div>
    <div class="stats-table-wrap">
      <table class="stats-table">
        <thead>
          <tr>
            <th>来源</th>
            <th>用户</th>
            <th>会话</th>
            <th>已运行</th>
          </tr>
        </thead>
        <tbody id="stats-tbody"></tbody>
      </table>
      <div id="stats-empty" class="stats-empty hidden">当前没有正在运行的 Agent</div>
    </div>
    <div class="stats-foot">
      <span class="stats-last-updated" id="stats-ts"></span>
      <button class="btn btn-ghost" id="btn-stats-refresh" style="padding:6px 14px">刷新</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════════════
const S = {
  url:          '',
  userId:       '',
  token:        '',
  sessionId:    '',
  busy:         false,
  queue:        [],   // 排队中的消息列表
  abortCtrl:    null,
  aiName:       'AI',
  avatarUrl:    '',
  notifySource: null,  // EventSource for server-initiated push (cron)
  activeSubagentTaskIds: new Set(), // 正在运行的子任务 ID 集合
};

// Token 计数器动画状态（输入/输出各自独立）
const TOK_IN  = { rafId: null, displayed: null };
const TOK_OUT = { rafId: null, displayed: null };
// 最后一次收到 stream 数据的时间（毫秒），用于检测 >6s 的 stream 间隔
let lastStreamDataTime = 0;


// ══════════════════════════════════════════════════════════════════════
//  API helpers
// ══════════════════════════════════════════════════════════════════════
async function apiCreateSession() {
  const r = await fetch(`${S.url}/api/session/create`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${S.token}` },
  });
  if (!r.ok) throw new Error(`创建会话失败 HTTP ${r.status}`);
  return (await r.json()).session_id;
}

async function apiListSessions() {
  const r = await fetch(`${S.url}/api/sessions`, {
    headers: { Authorization: `Bearer ${S.token}` },
  });
  const err = Object.assign(new Error(`sessions HTTP ${r.status}`), { status: r.status });
  if (!r.ok) throw err;
  return (await r.json()).sessions || [];
}

async function apiDeleteSession(sessionId) {
  const r = await fetch(`${S.url}/api/session/${sessionId}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${S.token}` },
  });
  if (!r.ok) throw new Error(`删除会话失败 HTTP ${r.status}`);
}

async function deleteSessionItem(sessionId, itemEl) {
  try {
    await apiDeleteSession(sessionId);
    itemEl.remove();
    // if deleted session was active, create a new one
    if (sessionId === S.sessionId) {
      const next = document.querySelector('.sess-item');
      if (next) {
        await switchSession(next.dataset.sid);
      } else {
        await newSession();
      }
    }
    // show empty state if no sessions left
    const list = document.getElementById('sess-list');
    if (!list.querySelector('.sess-item')) {
      const empty = el('div', 'sess-empty');
      empty.textContent = '暂无历史对话';
      list.appendChild(empty);
    }
    toast('会话已删除');
  } catch (e) { toast(String(e), 'err'); }
}

async function apiGetMessages(sessionId) {
  const r = await fetch(
    `${S.url}/api/session/messages?session_id=${encodeURIComponent(sessionId)}`,
    { headers: { Authorization: `Bearer ${S.token}` } }
  );
  if (!r.ok) throw new Error(`messages HTTP ${r.status}`);
  return (await r.json()).messages || [];
}

async function fetchTokenUsage() {
  if (!S.token) return;
  try {
    const r = await fetch(`${S.url}/api/token-usage`, {
      headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) return;
    const { prompt_tokens, completion_tokens } = await r.json();
    animateToken(TOK_IN,  document.getElementById('tok-in'),  prompt_tokens);
    animateToken(TOK_OUT, document.getElementById('tok-out'), completion_tokens);
  } catch { /* ignore */ }
}

function animateToken(state, el, newVal) {
  if (!el) return;
  const from = state.displayed === null ? newVal : state.displayed;
  state.displayed = newVal;
  if (from === newVal) { el.textContent = newVal.toLocaleString('zh-CN'); return; }
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  const duration = 5000, startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + (newVal - from) * eased).toLocaleString('zh-CN');
    if (t < 1) { state.rafId = requestAnimationFrame(step); }
    else { state.rafId = null; }
  }
  state.rafId = requestAnimationFrame(step);
}

async function apiUpload(file) {
  const fd = new FormData();
  fd.append('file', file);
  const r = await fetch(`${S.url}/api/upload`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${S.token}` },
    body: fd,
  });
  if (!r.ok) throw new Error(`上传失败 HTTP ${r.status}: ${(await r.text()).slice(0,120)}`);
  return r.json();
}

// ══════════════════════════════════════════════════════════════════════
//  Sidebar — session list
// ══════════════════════════════════════════════════════════════════════
function relTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const min = diff / 60000;
  if (min < 1)  return '刚刚';
  if (min < 60) return `${Math.floor(min)} 分钟前`;
  const h = min / 60;
  if (h < 24)   return `${Math.floor(h)} 小时前`;
  const d = h / 24;
  if (d < 7)    return `${Math.floor(d)} 天前`;
  return new Date(iso).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function renderSessionList(sessions) {
  const list = document.getElementById('sess-list');
  list.innerHTML = '';
  if (!sessions || !sessions.length) {
    const empty = el('div', 'sess-empty');
    empty.textContent = '暂无历史对话';
    list.appendChild(empty);
    return;
  }
  sessions.forEach(s => {
    const item = el('div', 'sess-item');
    item.dataset.sid = s.session_id;
    if (s.session_id === S.sessionId) item.classList.add('active');

    const prev = el('div', 'sess-prev');
    prev.textContent = s.title || s.preview || '(空会话)';

    const time = el('div', 'sess-time');
    time.textContent = relTime(s.updated_at || s.created_at);

    const delBtn = el('button', 'sess-del');
    delBtn.title = '删除会话';
    delBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteSessionItem(s.session_id, item); });

    item.appendChild(prev);
    item.appendChild(time);
    item.appendChild(delBtn);
    item.addEventListener('click', () => switchSession(s.session_id));
    list.appendChild(item);
  });
}

async function refreshSessionList() {
  try {
    const sessions = await apiListSessions();
    renderSessionList(sessions);
  } catch (_) { /* silently ignore */ }
}

function updateSidebarPreview(sessionId, previewText) {
  const item = document.querySelector(`.sess-item[data-sid="${sessionId}"]`);
  if (!item) { refreshSessionList(); return; }
  const prev = item.querySelector('.sess-prev');
  if (prev) {
    const runes = [...previewText];
    prev.textContent = runes.length > 30 ? runes.slice(0, 30).join('') + '…' : previewText;
  }
  const time = item.querySelector('.sess-time');
  if (time) time.textContent = '刚刚';
  // move to top
  const list = document.getElementById('sess-list');
  if (list.firstChild !== item) list.insertBefore(item, list.firstChild);
}

async function switchSession(sessionId) {
  if (sessionId === S.sessionId) return;
  S.sessionId = sessionId;
  localStorage.setItem('se_session', sessionId);

  // update active highlight
  document.querySelectorAll('.sess-item').forEach(item =>
    item.classList.toggle('active', item.dataset.sid === sessionId)
  );

  // update header badge
  const badge = document.getElementById('sess-badge');
  badge.textContent = S.userId;
  badge.classList.remove('hidden');

  // load history
  msgs().innerHTML = '';
  await loadHistory(sessionId);
  subscribeNotify(sessionId);

  // auto-close sidebar on mobile after switching session
  closeSidebarOnMobile();
}

// ══════════════════════════════════════════════════════════════════════
//  History rendering
// ══════════════════════════════════════════════════════════════════════
// fmtBytes 将字节数格式化为可读字符串（如 1.2 KB / 3.4 MB）
function fmtBytes(n) {
  if (!n) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

// appendAttachments 向 body 追加附件气泡（图片内联展示，文件作为下载链接）
function appendAttachments(body, attachments, side) {
  if (!attachments || !attachments.length) return;
  attachments.forEach(att => {
    const bubble = el('div', 'bubble ' + side);
    if (att.type === 'image') {
      const img = document.createElement('img');
      img.className = 'msg-img';
      img.src = att.url;
      img.alt = att.filename || '图片';
      img.loading = 'lazy';
      bubble.appendChild(img);
    } else {
      const a = document.createElement('a');
      a.className = 'file-ref';
      a.href = att.url;
      a.target = '_blank';
      a.download = att.filename || '';
      const sizeStr = fmtBytes(att.size);
      a.textContent = '📎 ' + (att.filename || '文件') + (sizeStr ? ' · ' + sizeStr : '');
      bubble.appendChild(a);
    }
    body.appendChild(bubble);
  });
}

async function loadHistory(sessionId) {
  try {
    const messages = await apiGetMessages(sessionId);
    messages.forEach(m => {
      if (m.role === 'user') {
        addHistoryUserBubble(m.content, m.attachments);
      } else if (m.role === 'assistant' && (m.content || m.attachments?.length)) {
        addHistoryAIBubble(m.content, m.attachments);
      }
    });
    scrollEnd(true); // 历史加载完毕后强制跳到底部
  } catch (_) { /* new session or network error — no history to show */ }
}

function addHistoryUserBubble(text, attachments) {
  const row = el('div', 'row user');
  const avatar = el('div', 'avatar user'); avatar.textContent = '你';
  const body = el('div', 'msg-body user');
  if (text) {
    const bubble = el('div', 'bubble user');
    bubble.innerHTML = renderUserText(text);
    body.appendChild(bubble);
  }
  appendAttachments(body, attachments, 'user');
  row.appendChild(avatar);
  row.appendChild(body);
  msgs().appendChild(row);
}

function addHistoryAIBubble(text, attachments) {
  const row = el('div', 'row ai');
  const body = el('div', 'msg-body');
  const speaker = el('div', 'speaker'); speaker.textContent = S.aiName;
  body.appendChild(speaker);
  if (text) {
    const bubble = el('div', 'bubble ai');
    const tc = el('div', 'bubble-text');
    const processed = preMarkdown(text);
    tc.innerHTML = window.marked
      ? marked.parse(processed)
      : escHtml(text).replace(/\n/g, '<br>');
    bubble.appendChild(tc);
    body.appendChild(bubble);
  }
  appendAttachments(body, attachments, 'ai');
  const avatar = el('div', 'avatar ai');
  applyAvatar(avatar);
  row.appendChild(avatar);
  row.appendChild(body);
  msgs().appendChild(row);
}

// ══════════════════════════════════════════════════════════════════════
//  SSE 流式发送  POST /sse
// ══════════════════════════════════════════════════════════════════════
async function streamSSE(message, bubble, signal) {
  const url = `${S.url}/sse?session_id=${encodeURIComponent(S.sessionId)}&token=${encodeURIComponent(S.token)}`;

  const resp = await fetch(url, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ message }),
    signal,
  });

  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`HTTP ${resp.status}${errText ? ': ' + errText : ''}`);
  }

  const reader  = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf              = '';
  let textBuf          = '';
  let renderScheduled  = false;
  let ended            = false;
  let choice           = null;

  try {
    while (true) {
      // 后端每 25s 发一次心跳；超过 40s 没有任何字节视为连接已死，主动抛错退出，
      // 避免后端崩溃/代理超时后 reader.read() 无限期挂起导致 UI 卡死。
      let _readTimer;
      const { value, done } = await Promise.race([
        reader.read(),
        new Promise((_, rej) => (_readTimer = setTimeout(
          () => rej(new Error('SSE 连接超时（服务端无响应）')), 40_000))),
      ]).finally(() => clearTimeout(_readTimer));
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // 保留不完整行

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        let ev;
        try { ev = JSON.parse(raw); } catch { continue; }

        // 检测 >6s 间隔 → 拉取 token 消耗
        { const _now = Date.now();
          if (lastStreamDataTime > 0 && _now - lastStreamDataTime > 6000) fetchTokenUsage();
          lastStreamDataTime = _now;
        }

        switch (ev.type) {

          case 'text': {
            const chunk = ev.content || '';
            if (!chunk) break;
            rmTyping(bubble);
            textBuf += chunk;
            // RAF 节流：每帧最多 markdown 渲染一次，避免流式空白行
            if (!renderScheduled) {
              renderScheduled = true;
              requestAnimationFrame(() => {
                renderMDLive(bubble, textBuf);
                renderScheduled = false;
              });
            }
            scrollEnd();
            await yieldToMain(); // 让出主线程，给浏览器一次绘制机会，避免多 chunk 批量刷出
            break;
          }

          case 'speaker': {
            const name = (ev.content || '').trim() || 'AI';
            const el2 = bubble.closest('.row')?.querySelector('.speaker');
            if (el2) el2.textContent = name;
            const av = bubble.closest('.row')?.querySelector('.avatar.ai');
            if (av) av.textContent = name.slice(0,2).toUpperCase();
            break;
          }

          case 'progress': {
            appendProg(bubble, ev.step || '', ev.detail || '', ev.call_id || '', ev.elapsed_ms || 0);
            scrollEnd();
            break;
          }

          case 'interactive': {
            rmTyping(bubble);
            if (textBuf) renderMD(bubble, textBuf);
            const kind = ev.step;
            const data = typeof ev.data === 'string' ? JSON.parse(ev.data) : (ev.data || {});
            // 与 abort 信号赛跑：点停止时立即抛出 AbortError，不再卡在 showInteractive
            const abortPromise = new Promise((_, reject) => {
              if (signal.aborted) { reject(new DOMException('Aborted', 'AbortError')); return; }
              signal.addEventListener('abort', () => reject(new DOMException('Aborted', 'AbortError')), { once: true });
            });
            choice = await Promise.race([showInteractive(bubble, kind, data), abortPromise]);
            scrollEnd();
            break;
          }

          case 'image': {
            rmTyping(bubble);
            const img = document.createElement('img');
            img.className = 'msg-img';
            img.src = ev.content || '';
            img.alt = '图片';
            img.loading = 'lazy';
            bubble.appendChild(img);
            scrollEnd();
            break;
          }

          case 'error': {
            appendError(bubble, ev.content || '未知错误');
            scrollEnd();
            ended = true;
            return null;
          }

          case 'end': {
            clearLLMWait(bubble);
            rmTyping(bubble);
            bubble.querySelectorAll('.status-line').forEach(el => el.remove());
            bubble.querySelector('.proc-log')?.removeAttribute('open');
            if (textBuf) renderMD(bubble, textBuf);
            fetchAppName();
            fetchTokenUsage();
            scrollEnd();
            ended = true;
            return choice;
          }
        }
      }
    }
  } finally {
    reader.releaseLock();
  }

  // 流结束但未收到 end 事件 → 连接中断（后端重启、崩溃、超时等）
  if (!ended) {
    clearLLMWait(bubble);
    rmTyping(bubble);
    bubble.querySelectorAll('.status-line').forEach(e => e.remove());
    if (textBuf) renderMD(bubble, textBuf); // 保留已收到的部分内容
    appendError(bubble, '连接已中断，内容可能不完整，请重试');
  }
  return null;
}

// ══════════════════════════════════════════════════════════════════════
//  sendMessage — one full conversation turn
// ══════════════════════════════════════════════════════════════════════
async function sendMessage(message, showUser = true) {
  if (S.busy) return;
  S.busy = true;
  S.abortCtrl = new AbortController();
  setSendState(true);

  if (showUser) {
    addUserBubble(message);
    updateSidebarPreview(S.sessionId, message);
  }

  const { bubble } = addAIBubble();

  try {
    const choice = await streamSSE(message, bubble, S.abortCtrl.signal);
    if (choice !== null) {
      S.busy = false;
      setSendState(false);
      addUserBubble(choice);
      await sendMessage(choice, false);
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      rmTyping(bubble);
      bubble.querySelectorAll('.status-line').forEach(el => el.remove());
      bubble.querySelector('.proc-log')?.removeAttribute('open');
      appendProg(bubble, 'stopped', '已停止', '', 0);
    } else {
      clearLLMWait(bubble);
      rmTyping(bubble);
      bubble.querySelectorAll('.status-line').forEach(e => e.remove());
      appendError(bubble, String(e));
    }
  } finally {
    S.abortCtrl = null;
    S.busy = false;
    setSendState(false);
    scrollEnd();
    // 顶层发送才刷新，递归交互回复无需重复调度
    // 延迟 7s 给后端异步标题生成留足时间（第3轮后触发）
    if (showUser) setTimeout(refreshSessionList, 7000);
    // 处理排队中的下一条消息（仅顶层调用，避免递归交互响应重复触发）
    if (showUser && S.queue.length > 0) {
      const next = S.queue.shift();
      next.row.remove();   // 移除排队气泡，sendMessage 会重新添加正式气泡
      updateQueueBadge();
      sendMessage(next.msg);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════
//  Interactive widgets
// ══════════════════════════════════════════════════════════════════════
function showInteractive(bubble, kind, data) {
  return new Promise(resolve => {
    const wrap = el('div', 'ia-wrap');

    if (kind === 'options') {
      const title = el('div', 'ia-title');
      title.textContent = data.title || '请选择：';
      wrap.appendChild(title);
      const list = el('div', 'opts-list');
      (data.options || []).forEach(opt => {
        const btn = el('button', 'opt-btn');
        btn.textContent = opt.label;
        btn.onclick = () => {
          list.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
          btn.classList.add('chosen');
          resolve(opt.value);
        };
        list.appendChild(btn);
      });
      wrap.appendChild(list);

    } else if (kind === 'confirm') {
      const msgEl = el('div', 'cfm-msg');
      msgEl.textContent = data.message || '确认操作？';
      const btns = el('div', 'cfm-btns');
      const yLabel = data.confirm_label || '确认';
      const nLabel = data.cancel_label  || '取消';
      const yBtn = el('button', 'btn btn-green');
      yBtn.textContent = yLabel;
      const nBtn = el('button', 'btn btn-ghost');
      nBtn.textContent = nLabel;
      const pick = v => { [yBtn, nBtn].forEach(b => b.disabled = true); resolve(v); };
      yBtn.onclick = () => pick(yLabel);
      nBtn.onclick = () => pick(nLabel);
      btns.appendChild(yBtn); btns.appendChild(nBtn);
      wrap.appendChild(msgEl); wrap.appendChild(btns);

    } else if (kind === 'upload') {
      const title = el('div', 'ia-title');
      title.textContent = data.title || '上传图片';
      wrap.appendChild(title);
      if (data.prompt) {
        const prompt = el('div', 'upld-prompt');
        prompt.textContent = data.prompt;
        wrap.appendChild(prompt);
      }
      const row = el('div', 'upld-row');
      const preview = el('img', 'upld-preview');
      const fileInput = el('input');
      fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
      const pickBtn = el('button', 'btn btn-primary'); pickBtn.textContent = '选择图片';
      const skipBtn = el('button', 'btn btn-ghost');   skipBtn.textContent = '跳过';
      const disable = () => { pickBtn.disabled = true; skipBtn.disabled = true; };
      fileInput.onchange = async () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
        reader.readAsDataURL(file);
        pickBtn.textContent = '上传中…'; pickBtn.disabled = true;
        try {
          const fd = new FormData(); fd.append('file', file);
          const resp = await fetch(`${S.url}/api/upload`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${S.token}` },
            body: fd,
          });
          if (!resp.ok) throw new Error(await resp.text());
          const { path } = await resp.json();
          disable();
          resolve(path);
        } catch (err) {
          pickBtn.disabled = false; pickBtn.textContent = '选择图片';
          toast('上传失败: ' + err.message, 'err');
        }
      };
      pickBtn.onclick = () => fileInput.click();
      skipBtn.onclick = () => { disable(); resolve('skip'); };
      row.appendChild(preview); row.appendChild(pickBtn); row.appendChild(skipBtn);
      wrap.appendChild(fileInput); wrap.appendChild(row);

    } else {
      resolve(null); return;
    }

    bubble.appendChild(wrap);
  });
}

const STEP_META = {
  llm_call:       { pending: true,  cls: 'c-blue',  label: '思考中'   },
  tool_call:      { pending: true,  cls: 'c-amber', label: '调用工具' },
  tool_done:      { icon: '✓',     cls: 'c-green', label: '工具完成' },
  tool_error:     { icon: '✗',     cls: 'c-red',   label: '工具失败' },
  compress_start: { pending: true,  cls: 'c-gray',  label: '正在压缩' },
  compress_done:  { icon: '✓',     cls: 'c-green', label: '压缩完成' },
  compress_error: { icon: '✗',     cls: 'c-red',   label: '压缩失败' },
};

function appendProg(bubble, step, detail, callID, ms) {
  if (!(step in STEP_META)) {
    const line = el('div', 'status-line');
    line.innerHTML =
      `<span class="step-icon c-blue">💬</span>` +
      `<span class="step-name c-blue">${escHtml(step)}</span>` +
      `<span class="status-text">${escHtml(detail)}</span>`;
    if (bubble.querySelector('.bubble-text')) {
      bubble.appendChild(line);
    } else {
      const anchor = bubble.querySelector('.typing');
      if (anchor) bubble.insertBefore(line, anchor);
      else bubble.appendChild(line);
    }
    return;
  }

  const procLog = bubble.querySelector('.proc-log');
  if (!procLog) return;
  procLog.classList.remove('hidden');

  const steps = procLog.querySelector('.proc-steps');
  const meta  = STEP_META[step];
  const refreshCount = () => {
    procLog.querySelector('.proc-count').textContent = `${steps.children.length} 步`;
  };

  // 完成事件：找到对应 pending 行，原地更新为完成状态，不新增行
  const parentStep = { tool_done: 'tool_call', tool_error: 'tool_call',
                       compress_done: 'compress_start', compress_error: 'compress_start' }[step];
  if (parentStep) {
    // 优先按 callID 精确匹配；callID 缺失时回退到 pop()（兼容旧数据）
    const pending = callID
      ? steps.querySelector(`.proc-step.step-pending[data-step="${parentStep}"][data-call-id="${callID}"]`)
      : [...steps.querySelectorAll(`.proc-step.step-pending[data-step="${parentStep}"]`)].pop();
    if (pending) {
      pending.classList.remove('step-pending');
      const iconEl = pending.querySelector('.step-icon');
      iconEl.className = `step-icon ${meta.cls}`;
      iconEl.innerHTML = meta.icon;
      if (detail) { const d = pending.querySelector('.step-detail'); if (d) d.textContent = detail; }
      if (ms) {
        let msEl = pending.querySelector('.step-ms');
        if (!msEl) { msEl = document.createElement('span'); msEl.className = 'step-ms'; pending.appendChild(msEl); }
        msEl.textContent = `${ms}ms`;
      }
      return;
    }
  }

  // tool_call 到来时清除 llm_call 等待行（LLM 已响应，进入工具执行阶段）
  if (step === 'tool_call') {
    steps.querySelectorAll('.proc-step[data-step="llm_call"]').forEach(r => r.remove());
    refreshCount();
  }

  // 新增行
  const line = el('div', 'proc-step');
  if (meta.pending) line.classList.add('step-pending');
  line.dataset.step = step;
  if (step === 'tool_call' && callID) line.dataset.callId = callID;
  const iconHtml = meta.pending
    ? `<span class="step-icon ${meta.cls}"><span class="spinner"></span></span>`
    : `<span class="step-icon ${meta.cls}">${meta.icon}</span>`;
  line.innerHTML =
    iconHtml +
    `<span class="step-name">${escHtml(meta.label)}</span>` +
    (detail ? `<span class="step-detail">${escHtml(detail)}</span>` : '') +
    (!meta.pending && ms ? `<span class="step-ms">${ms}ms</span>` : '');
  steps.appendChild(line);
  refreshCount();
}

// clearLLMWait 清除 proc-log 中的"思考中"等待行（llm_call 步骤）
// 若清完后无剩余步骤，则重新隐藏 proc-log（避免显示空的"0步"）
function clearLLMWait(bubble) {
  const procLog = bubble?.querySelector('.proc-log');
  if (!procLog) return;
  const steps = procLog.querySelector('.proc-steps');
  steps.querySelectorAll('.proc-step[data-step="llm_call"]').forEach(r => r.remove());
  const count = steps.children.length;
  procLog.querySelector('.proc-count').textContent = `${count} 步`;
  if (count === 0) procLog.classList.add('hidden');
}

function appendError(bubble, msg) {

function renderMD(bubble, text) {
  let tc = bubble.querySelector('.bubble-text');
  if (!tc) {
    tc = el('div', 'bubble-text');
    const procLog = bubble.querySelector('.proc-log');
    if (procLog) {
      procLog.insertAdjacentElement('afterend', tc); // Fix A：插在 proc-log 之后
    } else {
      bubble.insertBefore(tc, bubble.firstChild);
    }
  }
  const ia = bubble.querySelector('.ia-wrap');
  const processed = preMarkdown(text);
  const html = window.marked
    ? marked.parse(processed)
    : escHtml(text).replace(/\n/g, '<br>');
  // 先瞬间隐藏（无动画），替换内容后再淡入，消除流式纯文本→markdown 的跳变感
  tc.style.transition = 'none';
  tc.style.opacity = '0';
  tc.innerHTML = html;
  if (ia) bubble.appendChild(ia);
  requestAnimationFrame(() => {
    tc.style.transition = 'opacity 0.18s';
    tc.style.opacity = '1';
  });
}

function rmTyping(bubble) { bubble.querySelector('.typing')?.remove(); }

function msgs()      { return document.getElementById('msgs'); }
// autoScroll：用户未手动往上滚动时保持自动跟底；手动向上滚动后暂停，
// 待用户滚回底部（距底 ≤80px）时自动恢复。
let autoScroll = true;

function scrollEnd(force = false) {
  const m = msgs();
  if (force) { m.scrollTop = m.scrollHeight; autoScroll = true; return; }
  if (autoScroll) m.scrollTop = m.scrollHeight;
}
function escHtml(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// yieldToMain: 通过 MessageChannel 让出主线程（task 边界，非 microtask），
// 给浏览器一次真正的绘制机会，使流式 chunk 逐个显示而非批量刷出。
const _yieldCh = new MessageChannel();
function yieldToMain() {
  return new Promise(resolve => {
    _yieldCh.port1.onmessage = resolve;
    _yieldCh.port2.postMessage(undefined);
  });
}

// renderMDLive: 流式阶段用 marked 实时渲染 markdown（无 fade 动画）。
// 调用方通过 requestAnimationFrame 节流，每帧最多渲染一次，避免空白行问题。
function renderMDLive(bubble, text) {
  let tc = bubble.querySelector('.bubble-text');
  if (!tc) {
    tc = document.createElement('div');
    tc.className = 'bubble-text';
    const procLog = bubble.querySelector('.proc-log');
    procLog ? procLog.insertAdjacentElement('afterend', tc)
            : bubble.insertBefore(tc, bubble.firstChild);
  }
  const processed = preMarkdown(text);
  const html = window.marked
    ? marked.parse(processed)
    : escHtml(text).replace(/\n/g, '<br>');
  tc.innerHTML = html;
}

// fmtElapsed 将毫秒数格式化为人类可读字符串（如 1.2s / 2m 14s）
function fmtElapsed(ms) {
  if (!ms || ms <= 0) return '';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return m + 'm ' + (s > 0 ? s + 's' : '');
}

// addSubagentCard 在消息列表末尾追加一个折叠式子任务卡片行，返回 {row, steps, summary}
// label：spawn_subagent 提供的短标签（优先作卡片标题）；taskDesc：完整任务描述（降级用）

  const titleText = label
    ? label
    : (taskDesc.length > 60 ? taskDesc.slice(0, 60) + '…' : taskDesc);

  card.innerHTML =
    '<summary class="proc-summary">' +
      '<span class="sa-status-icon"><span class="spinner"></span></span>' +
      '<span class="sa-info">' +

      '<span class="sa-elapsed"></span>' +

    '<div class="proc-steps"></div>';

  msgs().appendChild(row);
  return {
    row,
    steps: card.querySelector('.proc-steps'),
    summary: card.querySelector('.proc-summary'),
