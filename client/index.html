  };
}

// appendSubagentStep 向子 agent 卡片追加一条步骤行，复用现有 proc-step 样式
function appendSubagentStep(steps, step, detail, callID, ms) {
  const meta = STEP_META[step];
  const div = el('div', meta ? 'proc-step' + (meta.pending ? ' step-pending' : '') : 'proc-step');
  div.dataset.step = step;
  if (step === 'tool_call' && callID) div.dataset.callId = callID;

  // tool_call 到来时清除 llm_call 等待行（LLM 已响应，进入工具执行阶段）
  if (step === 'tool_call') {
    steps.querySelectorAll('.proc-step[data-step="llm_call"]').forEach(r => r.remove());
  }

  const iconEl = el('span', 'step-icon ' + (meta ? meta.cls : 'c-blue'));
  if (meta && meta.pending) {
    iconEl.innerHTML = '<span class="spinner"></span>';
  } else {
    iconEl.textContent = meta ? meta.icon : '▸';
  }

  const nameEl = el('span', 'step-name');
  nameEl.textContent = meta ? meta.label : step;

  const detailEl = el('span', 'step-detail');
  detailEl.textContent = detail || '';

  div.appendChild(iconEl); div.appendChild(nameEl); div.appendChild(detailEl);

  if (ms) {
    const msEl = el('span', 'step-ms');
    msEl.textContent = fmtElapsed(ms);
    div.appendChild(msEl);
  }
  steps.appendChild(div);
  // 完成事件：找到对应 pending 行，原地更新（与 appendProg 逻辑一致）
  return div;
}

// updateSubagentStep 处理 tool_done/tool_error 等完成事件：找到对应 pending 行原地更新
function updateSubagentStep(steps, step, detail, callID, ms) {
  const parentStep = { tool_done: 'tool_call', tool_error: 'tool_call',
                       compress_done: 'compress_start', compress_error: 'compress_start' }[step];
  if (!parentStep) return false;
  const meta = STEP_META[step];
  // 优先按 callID 精确匹配；callID 缺失时回退到 pop()
  const pending = callID
    ? steps.querySelector('.proc-step.step-pending[data-step="' + parentStep + '"][data-call-id="' + callID + '"]')
    : [...steps.querySelectorAll('.proc-step.step-pending[data-step="' + parentStep + '"]')].pop();
  if (!pending) return false;
  pending.classList.remove('step-pending');
  const iconEl = pending.querySelector('.step-icon');
  iconEl.className = 'step-icon ' + (meta ? meta.cls : 'c-green');
  iconEl.innerHTML = meta ? meta.icon : '✓';
  if (detail) { const d = pending.querySelector('.step-detail'); if (d) d.textContent = detail; }
  if (ms) {
    let msEl = pending.querySelector('.step-ms');
    if (!msEl) { msEl = el('span', 'step-ms'); pending.appendChild(msEl); }
    msEl.textContent = fmtElapsed(ms);
  }
  return true;
}

// ── Server-initiated push (cron) ─────────────────────────────────────────
function subscribeNotify(sessionId) {
  if (S.notifySource) { S.notifySource.close(); S.notifySource = null; }
  S.activeSubagentTaskIds.clear(); // 切换会话时重置子任务跟踪状态
  if (!sessionId || !S.token) return;
  const url = `${S.url}/api/notify?session_id=${encodeURIComponent(sessionId)}&token=${encodeURIComponent(S.token)}`;
  const es = new EventSource(url);
  S.notifySource = es;
  let bubble = null, textBuf = '', renderScheduled = false;
  const subagentCards = {}; // task_id → {row, steps, summary, card, startMs}

  // ── 子任务等待进度追踪 ───────────────────────────────────────────────
  let waitBubble = null, waitTotal = 0, waitDone = 0;

  // ── 断线补偿：子任务全部结束 → 等待 notify_start；若未到则从 DB 补加消息 ──
  let waitingForBatch = false, batchRecoveryTimer = null, notifyTurnActive = false;
  let fallbackInFlight = false; // 防止并发调用导致重复插入
  let startupChecked = false;   // 首次连接的一次性追赶检查标志
  let batchBaseCount = -1;      // setWaitingForBatch 时快照的 DB assistant 消息数；-1 = 未取

  function clearBatchRecoveryTimer() {
    if (batchRecoveryTimer) { clearTimeout(batchRecoveryTimer); batchRecoveryTimer = null; }
  }

  async function doFallbackLoad(retryCount = 0) {
    clearBatchRecoveryTimer();
    if (fallbackInFlight) return; // 另一个实例正在运行，避免重复插入
    // notify_start 已收到且正在走正常 SSE 路径（有 bubble），无需 fallback
    if (notifyTurnActive && bubble) { waitingForBatch = false; fallbackInFlight = false; return; }
    fallbackInFlight = true;
    if (S.sessionId !== sessionId) { waitingForBatch = false; notifyTurnActive = false; fallbackInFlight = false; return; }
    try {
      const messages = await apiGetMessages(sessionId);
      const aiMsgs = messages.filter(m => m.role === 'assistant' && m.content);
      // 用 batchBaseCount（setWaitingForBatch 时快照的 DB 计数）作为基准，
      // 避免初始轮次 text+tool_calls 产生多条 origin_session_messages 记录
      // 导致 domAICount 与 aiMsgs.length 不一致的假阳性插入。
      const baseCount = batchBaseCount >= 0 ? batchBaseCount : msgs().querySelectorAll('.row.ai').length;
      if (aiMsgs.length <= baseCount) {
        // DB 尚无新消息（LLM 可能还在跑）
        // 若 notify_start 已收到且正在走正常路径，停止轮询避免后续重复插入
        fallbackInFlight = false;
        if (notifyTurnActive && bubble) { waitingForBatch = false; return; }
        // 最多重试 10 次，间隔 3s（共约 30s）
        if (retryCount < 10) {
          batchRecoveryTimer = setTimeout(() => doFallbackLoad(retryCount + 1), 3000);
        } else {
          waitingForBatch = false; notifyTurnActive = false; // 超时放弃
        }
        return;
      }
      // await 期间 notify_start 可能已抵达并创建 bubble：正常 SSE 路径在渲染，无需 fallback 插入
      if (notifyTurnActive && bubble) { waitingForBatch = false; fallbackInFlight = false; return; }
      waitingForBatch = false; notifyTurnActive = false; fallbackInFlight = false;
      for (let i = baseCount; i < aiMsgs.length; i++) {
        addHistoryAIBubble(aiMsgs[i].content, aiMsgs[i].attachments);
      }
      scrollEnd();
      refreshSessionList();
    } catch (_) { waitingForBatch = false; notifyTurnActive = false; fallbackInFlight = false; }
  }

  async function setWaitingForBatch() {
    if (waitingForBatch) return; // 避免重复设置
    waitingForBatch = true;
    clearBatchRecoveryTimer();
    // 快照此刻 DB 的 assistant 消息数，供 doFallbackLoad 作为比较基准，
    // 避免初始轮次 text+tool_calls 写入多条 origin_session_messages 导致假阳性。
    try {
      const msgs_ = await apiGetMessages(sessionId);
      batchBaseCount = msgs_.filter(m => m.role === 'assistant' && m.content).length;
    } catch (_) {
      batchBaseCount = msgs().querySelectorAll('.row.ai').length; // 降级：用 DOM 计数
    }
    batchRecoveryTimer = setTimeout(() => {
      if (waitingForBatch && !notifyTurnActive) doFallbackLoad();
    }, 5000);
  }

  // 在主 AI 气泡末尾注入（或复用）进度 widget
  function getOrCreateWaitWidget() {
    if (!waitBubble) return null;
    let w = waitBubble.querySelector('.sa-wait-widget');
    if (!w) {
      w = el('div', 'sa-wait-widget');
      w.innerHTML = '<span class="spinner"></span>' +
        '<span>子任务进行中… <strong class="sa-wait-counter"></strong> 已完成</span>';
      waitBubble.appendChild(w);
    }
    return w;
  }

  // 刷新 "X / Y 已完成" 数字
  function updateWaitWidget() {
    const w = getOrCreateWaitWidget();
    if (!w) return;
    const counter = w.querySelector('.sa-wait-counter');
    if (counter) counter.textContent = waitDone + ' / ' + waitTotal;
  }

  // 任务全部结束后移除 widget，重置计数器
  function removeWaitWidget() {
    if (waitBubble) {
      const w = waitBubble.querySelector('.sa-wait-widget');
      if (w) w.remove();
    }
    waitBubble = null; waitTotal = 0; waitDone = 0; batchBaseCount = -1;
  }

  // ── 断连检测 ─────────────────────────────────────────────────────────
  // 后端重启/崩溃 → EventSource 断连 → onerror 触发。
  // 超过 5s 未恢复则将所有仍在运行的子任务卡片标记为"连接中断"，
  // 避免卡片无限转圈、停止按钮永远显示。
  let disconnectTimer = null;

  function markAllCardsDisconnected() {
    for (const tid of Object.keys(subagentCards)) {
      const entry = subagentCards[tid];
      entry.card.classList.add('sa-failed');
      entry.card.removeAttribute('open');
      const iconEl = entry.summary.querySelector('.sa-status-icon');
      if (iconEl) iconEl.innerHTML = '<span class="c-amber">⊘</span>';
      const elEl = entry.summary.querySelector('.sa-elapsed');
      if (elEl) elEl.textContent = '已中断';
      const hintEl = entry.summary.querySelector('.sa-progress-hint');
      if (hintEl) { hintEl.textContent = '🔌 连接中断'; hintEl.style.display = 'block'; }
      S.activeSubagentTaskIds.delete(Number(tid));
      delete subagentCards[tid];
    }
    removeWaitWidget();
    if (!S.busy) setSendState(false);
  }

  es.onerror = function() {
    if (disconnectTimer) return; // 已有计时，不重复设置
    if (Object.keys(subagentCards).length === 0) return; // 无运行中的卡片，无需处理
    disconnectTimer = setTimeout(() => {
      disconnectTimer = null;
      markAllCardsDisconnected();
    }, 5000); // 5s 后仍未恢复则标记全部为中断
  };

  es.onopen = function() {
    // 重连成功：取消待处理的断连计时，任务若仍在后端运行则继续等待其事件
    if (disconnectTimer) { clearTimeout(disconnectTimer); disconnectTimer = null; }
    // 若重连时正处于"等待 notify_start"或"notify_start 已收到但 end 未到"的状态，
    // 说明重连窗口内事件丢失，延迟 1s 后（给后端推送留余量）尝试从 DB 补加消息
    if (waitingForBatch || notifyTurnActive) {
      setTimeout(() => {
        if (S.sessionId === sessionId && (waitingForBatch || notifyTurnActive)) doFallbackLoad();
      }, 1000);
    }
    // 首次连接时的一次性追赶检查：覆盖 loadHistory 与 SSE 建立之间的竞态窗口。
    // 若 LLM 在此窗口内完成写入，事件已发布但无订阅者接收，此处从 DB 补加。
    if (!startupChecked) {
      startupChecked = true;
      setTimeout(async () => {
        if (S.sessionId !== sessionId || fallbackInFlight || waitingForBatch || notifyTurnActive) return;
        try {
          const messages = await apiGetMessages(sessionId);
          const aiMsgs = messages.filter(m => m.role === 'assistant' && m.content);
          const domAICount = msgs().querySelectorAll('.row.ai').length;
          if (aiMsgs.length > domAICount) {
            for (let i = domAICount; i < aiMsgs.length; i++) {
              addHistoryAIBubble(aiMsgs[i].content, aiMsgs[i].attachments);
            }
            scrollEnd(); refreshSessionList();
          }
        } catch (_) {}
      }, 2000);
    }
  };

  es.onmessage = function(e) {
    let ev;
    try { ev = JSON.parse(e.data); } catch { return; }
    switch (ev.type) {
      case 'cron_start':
        addUserBubble('\u23f0 ' + (ev.content || ''));
        bubble = addAIBubble().bubble;
        textBuf = ''; renderScheduled = false;
        scrollEnd();
        break;
      case 'notify_start': {
        clearBatchRecoveryTimer(); waitingForBatch = false; notifyTurnActive = true;
        // 子任务全部完成后的回调：追加到派发子任务的那条 AI 气泡，而非新建气泡行。
        // 以最后一张子任务卡片为锚点：卡片之后若出现新用户/AI消息（说明用户已发起新对话），
        // 则退化为新建气泡；否则找卡片之前最近的 AI 气泡进行追加。
        removeWaitWidget(); // 所有子任务已完成，移除等待进度条
        let targetBubble = null;
        const allRows = [...msgs().children];
        let lastSAIdx = -1;
        for (let i = allRows.length - 1; i >= 0; i--) {
          if (allRows[i].classList.contains('subagent-row')) { lastSAIdx = i; break; }
        }
        if (lastSAIdx >= 0) {
          const hasNewMsg = allRows.slice(lastSAIdx + 1)
            .some(r => r.classList.contains('user') || r.classList.contains('ai'));
          if (!hasNewMsg) {
            for (let i = lastSAIdx - 1; i >= 0; i--) {
              if (allRows[i].classList.contains('ai')) {
                targetBubble = allRows[i].querySelector('.bubble.ai');
                break;
              }
            }
          }
        }
        if (targetBubble) {
          targetBubble.appendChild(el('div', 'notify-divider'));
          const wrap = el('div', 'notify-append-wrap');
          targetBubble.appendChild(wrap);
          bubble = wrap;
        } else {
          bubble = addAIBubble().bubble;
        }
        textBuf = ''; renderScheduled = false;
        break;
      }
      case 'text':
        if (!bubble) break;
        rmTyping(bubble);
        textBuf += (ev.content || '');
        if (!renderScheduled) {
          renderScheduled = true;
          const _b = bubble;
          requestAnimationFrame(() => {
            renderMDLive(_b, textBuf);
            renderScheduled = false;
          });
        }
        scrollEnd();
        break;
      case 'progress':
        if (!bubble) break;
        appendProg(bubble, ev.step || '', ev.detail || '', ev.call_id || '', ev.elapsed_ms || 0);
        scrollEnd();
        break;
      case 'speaker': {
        if (!bubble) break;
        const sp = bubble.closest('.row')?.querySelector('.speaker');
        if (sp) sp.textContent = (ev.content || '').trim() || 'AI';
        break;
      }
      case 'end': {
        if (!bubble) {
          // notify_start 丢失时：收到 end 说明 LLM 已写入 DB，立即从 DB 补加
          // 注意：不依赖 waitingForBatch 状态（5s 计时器可能已提前触发并重置了该标志）
          doFallbackLoad();
          break;
        }
        const wasNotifyActive = notifyTurnActive; notifyTurnActive = false;
        clearLLMWait(bubble);
        rmTyping(bubble);
        bubble.querySelectorAll('.status-line').forEach(el => el.remove());
        bubble.querySelector('.proc-log')?.removeAttribute('open');
        if (textBuf) renderMD(bubble, textBuf);
        // 无文字输出时清理：notify_start 追加的 wrapper 只删 wrapper+分隔线；cron_start 删整行
        if (!textBuf) {
          if (bubble.classList.contains('notify-append-wrap')) {
            const div = bubble.previousElementSibling;
            if (div?.classList.contains('notify-divider')) div.remove();
            bubble.remove();
          } else {
            bubble.closest('.row')?.remove();
          }
        }
        scrollEnd();
        const hadText = !!textBuf;
        bubble = null; textBuf = '';
        // notify_start 收到但无文字：text 事件可能在重连窗口丢失，从 DB 补加
        if (!hadText && wasNotifyActive) { doFallbackLoad(); break; }
        refreshSessionList();
        fetchTokenUsage();
        break;
      }
      case 'image':
        if (!bubble) break;
        rmTyping(bubble);
        { const img = document.createElement('img');
          img.className = 'msg-img';
          img.src = ev.content || '';
          img.alt = '图片';
          img.loading = 'lazy';
          bubble.appendChild(img); }
        scrollEnd();
        break;
      case 'error':
        if (bubble) { appendError(bubble, ev.content || '未知错误'); scrollEnd(); }
        break;

      // notifyBatch/notifyParent 触发的父 agent 轮次可能调用 exec 等需要用户确认的工具。
      // 用户点击确认后，通过 sendMessage 触发新一轮主会话 LLM，agent 调用 exec_run 完成执行。
      case 'interactive': {
        if (!bubble) break;
        rmTyping(bubble);
        if (textBuf) renderMD(bubble, textBuf);
        const iKind = ev.step;
        const iData = typeof ev.data === 'string' ? JSON.parse(ev.data) : (ev.data || {});
        showInteractive(bubble, iKind, iData).then(choice => {
          if (choice !== null) {
            addUserBubble(choice);
            sendMessage(choice, false);
          }
        });
        scrollEnd();
        break;
      }

      // ── 子 agent 折叠卡片事件 ─────────────────────────────────────────
      case 'subagent_start': {
        const taskId = ev.task_id;
        if (!taskId) break;
        const desc = ev.content || '子任务';
        const label = ev.label || '';
        const card = addSubagentCard(taskId, desc, label);
        subagentCards[taskId] = { ...card, startMs: Date.now(), desc, label };
        S.activeSubagentTaskIds.add(taskId);
        setSendState(S.busy); // 确保停止按钮可见
        // 首次 subagent_start：找主 AI 气泡，后续直接复用 waitBubble
        if (!waitBubble) {
          const allRows = [...msgs().children];
          for (let i = allRows.length - 1; i >= 0; i--) {
            if (allRows[i].classList.contains('ai')) {
              waitBubble = allRows[i].querySelector('.bubble.ai');
              break;
            }
            if (allRows[i].classList.contains('user')) break;
          }
        }
        waitTotal++;
        updateWaitWidget();
        scrollEnd();
        break;
      }
      // subagent_report_progress：子 agent 通过 report_task_progress 工具主动上报的里程碑进度。
      // 区别于 subagent_progress（工具调用步骤），此事件字段为 {task_id, label, progress}。
      // 每次上报追加一条里程碑行（保留历史，用户可看到进度演变）。
      case 'subagent_report_progress': {
        const entry = subagentCards[ev.task_id];
        const progress = (ev.progress || '').trim();
        if (!entry || !progress) break;
        // 展开区：追加带样式的里程碑行（完整历史，展开后可见）
        const div = el('div', 'proc-step sa-report-progress');
        div.dataset.step = 'report_progress';
        const iconEl = el('span', 'step-icon c-blue');
        iconEl.textContent = '▶';
        const detailEl = el('span', 'step-detail');
        detailEl.textContent = progress;
        div.appendChild(iconEl);
        div.appendChild(detailEl);
        entry.steps.appendChild(div);
        // summary 栏：实时更新最新进度（折叠状态下可见）
        const hintEl = entry.summary.querySelector('.sa-progress-hint');
        if (hintEl) { hintEl.textContent = progress; hintEl.style.display = 'block'; }
        const elEl = entry.summary.querySelector('.sa-elapsed');
        if (elEl) elEl.textContent = fmtElapsed(Date.now() - entry.startMs);
        scrollEnd();
        break;
      }
      case 'subagent_progress': {
        const entry = subagentCards[ev.task_id];
        if (!entry) break;
        const step = ev.step || '', detail = ev.detail || '', ms = ev.elapsed_ms || 0;
        if (!updateSubagentStep(entry.steps, step, detail, ev.call_id || '', ms)) {
          appendSubagentStep(entry.steps, step, detail, ev.call_id || '', ms);
        }
        // 更新 summary 耗时
        const elEl = entry.summary.querySelector('.sa-elapsed');
        if (elEl) elEl.textContent = fmtElapsed(Date.now() - entry.startMs);
        scrollEnd();
        break;
      }
      case 'subagent_text': {
        const entry = subagentCards[ev.task_id];
        if (!entry || !ev.content) break;
        // 累积文本到单一容器，整体 markdown 渲染，避免逐 token 产生碎片行
        if (!entry.textBuf) entry.textBuf = '';
        entry.textBuf += ev.content;
        if (!entry.textEl) {
          const wrap = el('div', 'sa-text-output');
          const tc = el('div', 'bubble-text');
          wrap.appendChild(tc);
          entry.steps.appendChild(wrap);
          entry.textEl = tc;
        }
        const processed = preMarkdown(entry.textBuf);
        entry.textEl.innerHTML = window.marked
          ? marked.parse(processed)
          : escHtml(entry.textBuf).replace(/\n/g, '<br>');
        scrollEnd();
        break;
      }
      case 'subagent_image': {
        const entry = subagentCards[ev.task_id];
        if (!entry || !ev.content) break;
        const imgDiv = el('div', 'proc-step');
        const img = document.createElement('img');
        img.className = 'msg-img'; img.src = ev.content;
        img.alt = '图片'; img.loading = 'lazy';
        img.style.maxWidth = '160px'; img.style.marginTop = '4px';
        imgDiv.appendChild(img);
        entry.steps.appendChild(imgDiv);
        scrollEnd();
        break;
      }
      case 'subagent_end': {
        const entry = subagentCards[ev.task_id];
        if (!entry) break;
        // 兜底：将所有未配对的 pending 步骤（如纯文本轮次的 llm_call）标记为完成
        entry.steps.querySelectorAll('.proc-step.step-pending').forEach(p => {
          p.classList.remove('step-pending');
          const ic = p.querySelector('.step-icon');
          if (ic) { ic.className = 'step-icon c-green'; ic.innerHTML = '✓'; }
        });
        entry.card.classList.add('sa-done');
        entry.card.removeAttribute('open'); // 完成后自动折叠
        const iconEl = entry.summary.querySelector('.sa-status-icon');
        if (iconEl) iconEl.innerHTML = '<span class="c-green">✓</span>';
        const elEl = entry.summary.querySelector('.sa-elapsed');
        if (elEl) elEl.textContent = fmtElapsed(ev.elapsed_ms || (Date.now() - entry.startMs));
        const hintEl = entry.summary.querySelector('.sa-progress-hint');
        if (hintEl) { hintEl.textContent = '✅ 已完成'; hintEl.style.display = 'block'; }
        S.activeSubagentTaskIds.delete(ev.task_id);
        delete subagentCards[ev.task_id];
        waitDone++; updateWaitWidget();
        if (Object.keys(subagentCards).length === 0 && waitTotal > 0) setWaitingForBatch();
        if (!S.busy) setSendState(false); // 所有子任务完成后隐藏停止按钮
        scrollEnd();
        break;
      }
      case 'subagent_error': {
        // 仅将错误信息追加到步骤列表供展开查看；卡片最终状态由 subagent_status 事件负责更新。
        const entry = subagentCards[ev.task_id];
        if (!entry) break;
        if (ev.content) appendSubagentStep(entry.steps, 'tool_error', ev.content, '', ev.elapsed_ms || 0);
        scrollEnd();
        break;
      }
      case 'subagent_status': {
        // runner.go 确认最终状态后推送，保证标签语义准确（取消/超时/强制中止/失败各不同）。
        const entry = subagentCards[ev.task_id];
        if (!entry) break;
        const status = ev.status || 'failed';
        const statusMap = {
          cancelled: { icon: '<span class="c-amber">⊘</span>', hint: '🚫 已取消',    elapsed: '已取消' },
          timed_out: { icon: '<span class="c-amber">⏱</span>', hint: '⏱ 已超时',    elapsed: '已超时' },
          killed:    { icon: '<span class="c-amber">⊘</span>', hint: '⚡ 已强制中止', elapsed: '已中止' },
          failed:    { icon: '<span class="c-red">✗</span>',   hint: '❌ 执行失败',  elapsed: '失败'   },
        };
        const meta = statusMap[status] || statusMap.failed;
        entry.card.classList.add('sa-failed');
        entry.card.removeAttribute('open');
        const iconEl = entry.summary.querySelector('.sa-status-icon');
        if (iconEl) iconEl.innerHTML = meta.icon;
        const elEl = entry.summary.querySelector('.sa-elapsed');
        if (elEl) elEl.textContent = meta.elapsed;
        const hintEl = entry.summary.querySelector('.sa-progress-hint');
        if (hintEl) { hintEl.textContent = meta.hint; hintEl.style.display = 'block'; }
        S.activeSubagentTaskIds.delete(ev.task_id);
        delete subagentCards[ev.task_id];
        waitDone++; updateWaitWidget();
        if (Object.keys(subagentCards).length === 0 && waitTotal > 0) setWaitingForBatch();
        if (!S.busy) setSendState(false); // 所有子任务完成后隐藏停止按钮
        scrollEnd();
        break;
      }
    }
  };
}

// ── Image helpers ─────────────────────────────────────────────────────────
const IMG_EXTS = new Set(['.jpg','.jpeg','.png','.gif','.webp','.bmp','.svg','.avif']);
function isImgPath(p) {
  const m = p.match(/\.([^./\\?#]+)(?:[?#]|$)/);
  return m ? IMG_EXTS.has('.'+m[1].toLowerCase()) : false;
}

// renderUserText: plain text with [文件: path] markers → HTML (images inline, files as badges)
function renderUserText(text) {
  const re = /\[文件: ([^\]]+)\]/g;
  let html = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) html += escHtml(text.slice(last, m.index));
    const raw = m[1].trim();
    const barIdx = raw.indexOf('|');
    const p = barIdx >= 0 ? raw.slice(0, barIdx) : raw;
    const displayName = barIdx >= 0 ? raw.slice(barIdx + 1) : p.split('/').pop();
    if (isImgPath(p)) {
      html += `<img class="msg-img" src="/${p}" alt="${escHtml(displayName)}" loading="lazy">`;
    } else {
      html += `<a class="file-ref" href="/${p}" download="${escHtml(displayName)}">📎 ${escHtml(displayName)}</a>`;
    }
    last = m.index + m[0].length;
  }
  html += escHtml(text.slice(last));
  return html;
}

// preMarkdown: convert [文件: path.img] to markdown image syntax before marked.parse
function preMarkdown(text) {
  return text.replace(/\[文件: ([^\]]+)\]/g, (_, raw) => {
    raw = raw.trim();
    const barIdx = raw.indexOf('|');
    const p = barIdx >= 0 ? raw.slice(0, barIdx) : raw;
    const displayName = barIdx >= 0 ? raw.slice(barIdx + 1) : p.split('/').pop();
    if (isImgPath(p)) return `![图片](/${p})`;
    return `📎 \`${displayName}\``;
  });
}

function setSendState(busy) {
  // 忙碌时仍保持发送按钮和输入框可用，允许继续排队；只额外显示停止按钮。
  // 父 agent 流结束后，若仍有子任务在运行，停止按钮保持可见以供取消子任务。
  const showStop = busy || S.activeSubagentTaskIds.size > 0;
  document.getElementById('btn-stop').style.display = showStop ? 'flex' : 'none';
}

function updateQueueBadge() {
  const bar = document.getElementById('queue-bar');
  const txt = document.getElementById('queue-bar-text');
  if (S.queue.length > 0) {
    txt.textContent = `⏳ ${S.queue.length} 条消息排队中`;
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function initTheme() {
  const v = localStorage.getItem('se_theme');
  const dark = v === 'dark' || (!v && matchMedia('(prefers-color-scheme:dark)').matches);
  if (dark) document.documentElement.setAttribute('data-theme', 'dark');
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (dark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('se_theme','light'); }
  else      { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('se_theme','dark'); }
}

function initSidebar() {
  // default: open on desktop, closed on mobile
  const saved = localStorage.getItem('se_sidebar');
  const isMobile = window.innerWidth <= 640;
  const open = saved !== null ? saved === 'open' : !isMobile;
  document.getElementById('app').dataset.sidebar = open ? 'open' : 'closed';
}
function toggleSidebar() {
  const app = document.getElementById('app');
  const isOpen = app.dataset.sidebar === 'open';
  app.dataset.sidebar = isOpen ? 'closed' : 'open';
  localStorage.setItem('se_sidebar', isOpen ? 'closed' : 'open');
}
function closeSidebarOnMobile() {
  if (window.innerWidth <= 640) {
    const app = document.getElementById('app');
    if (app.dataset.sidebar === 'open') {
      app.dataset.sidebar = 'closed';
      localStorage.setItem('se_sidebar', 'closed');
    }
  }
}

function loadSaved() {
  document.getElementById('f-code').value = localStorage.getItem('se_code') || '';
}

function showCfgErr(msg) {
  const e = document.getElementById('form-err');
  e.textContent = msg; e.style.display = 'block';
}

// enterApp: show the main UI, load sessions, restore or create a session.
// createNew=true forces creating a new session (used when user freshly logs in).
async function enterApp(createNew) {
  S.url = window.location.origin;

  // Load sessions for sidebar
  const sessions = await apiListSessions(); // may throw 401 → caller handles

  // Determine which session to use
  const savedSid = localStorage.getItem('se_session');
  let targetSid = null;

  if (!createNew && savedSid && sessions.find(s => s.session_id === savedSid)) {
    targetSid = savedSid;
  } else {
    targetSid = await apiCreateSession();
    localStorage.setItem('se_session', targetSid);
    // Prepend to sessions list for sidebar rendering
    sessions.unshift({
      session_id: targetSid,
      preview: '',
      updated_at: new Date().toISOString(),
      created_at: new Date().toISOString(),
    });
  }
  S.sessionId = targetSid;

  // Show app UI
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  document.getElementById('dot').classList.add('on');
  const badge = document.getElementById('sess-badge');
  badge.textContent = S.userId;
  badge.classList.remove('hidden');
  document.getElementById('btn-cancel').classList.remove('hidden');

  // Render sidebar
  renderSessionList(sessions);

  // 先获取角色名，再渲染历史消息，确保气泡名字正确
  await fetchAppName();

  // Load history for the active session
  await loadHistory(targetSid);
  subscribeNotify(targetSid);

  // 初次加载 token 消耗
  fetchTokenUsage();

  // 初次加载运行统计（更新 header badge）
  statsLoad();

  document.getElementById('ta').focus();
}

async function fetchAppName() {
  try {
    const r = await fetch(`${S.url}/api/app-info`, {
      headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) return;
    const { name, avatar_url } = await r.json();
    if (name) {
      S.aiName = name;
      document.getElementById('app-name').textContent = name;
      document.title = name;
    }
    S.avatarUrl = avatar_url || '';
  } catch { /* 静默失败，保留默认名称 */ }
}

// applyAvatar 将头像（图片或文字缩写）应用到 avatar 元素上。
function applyAvatar(avatarEl) {
  if (S.avatarUrl) {
    avatarEl.classList.add('has-img');
    avatarEl.style.backgroundImage = `url(${S.url}/${S.avatarUrl})`;
    avatarEl.textContent = '';
  } else {
    avatarEl.classList.remove('has-img');
    avatarEl.style.backgroundImage = '';
    avatarEl.textContent = S.aiName.slice(0, 2).toUpperCase();
  }
}

async function connect() {
  const code = document.getElementById('f-code').value.trim().toUpperCase();
  document.getElementById('form-err').style.display = 'none';

  if (!code) { showCfgErr('请填写邀请码'); return; }

  const btn = document.getElementById('btn-connect');
  btn.disabled = true; btn.textContent = '验证中…';

  try {
    const loginResp = await fetch(`${window.location.origin}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invite_code: code }),
    });
    if (!loginResp.ok) {
      const e = await loginResp.json().catch(() => ({}));
      showCfgErr(e.error || `登录失败 HTTP ${loginResp.status}`);
      return;
    }
    const { token, user_id } = await loginResp.json();

    S.token  = token;
    S.userId = user_id;

    // Persist so refresh doesn't need re-login
    localStorage.setItem('se_token', token);
    localStorage.setItem('se_user',  user_id);
    localStorage.setItem('se_code',  code);

    await enterApp(true);
    toast(`你好，${user_id}`);

  } catch (e) {
    showCfgErr(String(e));
  } finally {
    btn.disabled = false; btn.textContent = '连接';
  }
}

async function newSession() {
  if (!S.token) return;
  try {
    const sid = await apiCreateSession();
    S.sessionId = sid;
    localStorage.setItem('se_session', sid);
    msgs().innerHTML = '';
    const badge = document.getElementById('sess-badge');
    badge.textContent = S.userId;
    await refreshSessionList();
    document.querySelectorAll('.sess-item').forEach(item =>
      item.classList.toggle('active', item.dataset.sid === sid)
    );
    subscribeNotify(sid);
    toast('新会话已创建');
  } catch (e) { toast(String(e), 'err'); }
}

// ══════════════════════════════════════════════════════════════════════
//  File upload
// ══════════════════════════════════════════════════════════════════════
async function uploadFile(file) {
  if (!file) return;
  const t = toast(`上传 ${file.name}…`, 'ok', 60000);
  try {
    const r = await apiUpload(file);
    t.remove();
    toast(`✓ ${file.name} 已上传`);
    const ta = document.getElementById('ta');
    const ref = `[文件: ${r.path}|${file.name}]`;
    ta.value = ta.value ? ta.value + '\n' + ref : ref;
    autoH(ta); ta.focus();
  } catch (e) {
    t.remove(); toast(String(e), 'err');
  }
}

// ══════════════════════════════════════════════════════════════════════
//  Cron History Panel
// ══════════════════════════════════════════════════════════════════════
const HIST = { page: 1, pageSize: 20, total: 0 };

async function histLoad() {
  if (!S.token) return;
  const q = document.getElementById('hist-q').value.trim();
  try {
    const qs = `page=${HIST.page}&page_size=${HIST.pageSize}${q ? '&q=' + encodeURIComponent(q) : ''}`;
    const r = await fetch(`${S.url}/api/cron/history?${qs}`, {
      headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    HIST.total = data.total || 0;
    histRender(data.rows || []);
    document.getElementById('hist-total-text').textContent = `共 ${HIST.total} 条`;
    const totalPages = Math.max(1, Math.ceil(HIST.total / HIST.pageSize));
    document.getElementById('hist-page-num').textContent = `${HIST.page} / ${totalPages}`;
    document.getElementById('btn-hist-prev').disabled = HIST.page <= 1;
    document.getElementById('btn-hist-next').disabled = HIST.page >= totalPages;
  } catch (e) { toast('加载历史失败: ' + String(e), 'err'); }
}

function histRender(rows) {
  const tbody = document.getElementById('hist-tbody');
  const empty = document.getElementById('hist-empty');
  tbody.innerHTML = '';
  if (!rows.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const startedAt = new Date(r.started_at);
    const endedAt   = r.ended_at ? new Date(r.ended_at) : null;
    const durMs      = endedAt ? (endedAt - startedAt) : null;
    const dur        = durMs !== null ? fmtElapsed(durMs) : '—';
    const timeStr    = startedAt.toLocaleString('zh-CN', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
    tr.innerHTML =
      `<td style="font-weight:500">${escHtml(r.job_name || r.job_id)}</td>` +
      `<td><span class="hist-badge ${escHtml(r.status)}">${escHtml(r.status)}</span></td>` +
      `<td style="white-space:nowrap;font-size:.75rem">${timeStr}</td>` +
      `<td style="white-space:nowrap;font-variant-numeric:tabular-nums">${dur}</td>` +
      `<td class="hist-err-cell" title="${escHtml(r.error_msg || '')}">${escHtml(r.error_msg || '')}</td>`;

    // ── Actions cell ──────────────────────────────────────────────────
    const actTd  = document.createElement('td');
    actTd.style.whiteSpace = 'nowrap';
    const actWrap = document.createElement('div');
    actWrap.className = 'hist-actions';

    if (r.status === 'running') {
      const cancelBtn = _histBtn('cancel', '取消',   () => histCancelJob(r.job_id, tr));
      const killBtn   = _histBtn('kill',   '强制中止', () => histForceKillJob(r.job_id, tr));
      actWrap.appendChild(cancelBtn);
      actWrap.appendChild(killBtn);
    } else {
      const runBtn    = _histBtn('run',    '触发', () => histRunJob(r.job_id, tr));
      const removeBtn = _histBtn('remove', '移除', () => histRemoveJob(r.job_id, tr));
      actWrap.appendChild(runBtn);
      actWrap.appendChild(removeBtn);
    }

    actTd.appendChild(actWrap);
    tr.appendChild(actTd);
    tbody.appendChild(tr);
  });
}

function _histBtn(cls, label, handler) {
  const btn = document.createElement('button');
  btn.className = 'hist-act-btn ' + cls;
  btn.textContent = label;
  btn.addEventListener('click', handler);
  return btn;
}

function _histDisableRow(rowEl) {
  rowEl.querySelectorAll('.hist-act-btn').forEach(b => { b.disabled = true; });
}

async function histCancelJob(jobID, rowEl) {
  _histDisableRow(rowEl);
  try {
    const r = await fetch(`${S.url}/api/cron/${encodeURIComponent(jobID)}/cancel`, {
      method: 'POST', headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    toast(data.was_running ? '取消信号已发送' : '任务当前未在运行');
    // goroutine 需要一点时间响应取消信号并更新 DB
    setTimeout(() => histLoad(), 900);
  } catch (e) { toast('操作失败: ' + String(e), 'err'); histLoad(); }
}

async function histForceKillJob(jobID, rowEl) {
  _histDisableRow(rowEl);
  try {
    const r = await fetch(`${S.url}/api/cron/${encodeURIComponent(jobID)}/force-kill`, {
      method: 'POST', headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast('已强制中止');
    histLoad(); // DB 已同步更新，立即刷新
  } catch (e) { toast('操作失败: ' + String(e), 'err'); histLoad(); }
}

async function histRunJob(jobID, rowEl) {
  _histDisableRow(rowEl);
  try {
    const r = await fetch(`${S.url}/api/cron/${encodeURIComponent(jobID)}/run`, {
      method: 'POST', headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (data.started) {
      toast('任务已触发（后台运行）');
    } else {
      toast(data.message || '任务已在运行中');
    }
    // 记录已在 handler 中同步写入 DB，立即刷新即可（无需 setTimeout）
    histLoad();
  } catch (e) { toast('操作失败: ' + String(e), 'err'); histLoad(); }
}

async function histRemoveJob(jobID, rowEl) {
  _histDisableRow(rowEl);
  try {
    const r = await fetch(`${S.url}/api/cron/${encodeURIComponent(jobID)}`, {
      method: 'DELETE', headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast('定时任务已永久移除');
    HIST.page = 1;
    histLoad();
  } catch (e) { toast('操作失败: ' + String(e), 'err'); histLoad(); }
}

let _histQTimer = null;
function histQChange() {
  clearTimeout(_histQTimer);
  _histQTimer = setTimeout(() => { HIST.page = 1; histLoad(); }, 350);
}

function openHistPanel() {
  if (!S.token) { toast('请先连接服务器', 'err'); return; }
  document.getElementById('hist-overlay').classList.remove('hidden');
  HIST.page = 1;
  histLoad();
}

function closeHistPanel() {
  document.getElementById('hist-overlay').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════════════
//  Stats (实时运行统计)
// ══════════════════════════════════════════════════════════════════════
let _statsTimer = null;

async function statsLoad() {
  if (!S.token) return;
  try {
    const r = await fetch(`${S.url}/api/stats`, {
      headers: { Authorization: `Bearer ${S.token}` },
    });
    if (!r.ok) return;
    const data = await r.json();
    statsRender(data);
  } catch (_) { /* network error, ignore */ }
}

function statsRender(data) {
  const s = data.summary || {};
  const runs = data.runs || [];

  // Summary cards
  document.getElementById('stats-total').textContent  = s.total    ?? 0;
  document.getElementById('stats-web').textContent    = s.web      ?? 0;
  document.getElementById('stats-feishu').textContent = s.feishu   ?? 0;
  document.getElementById('stats-cron').textContent   = s.cron     ?? 0;
  document.getElementById('stats-sub').textContent    = s.subagent ?? 0;

  // Header badge
  const badge = document.getElementById('stats-count-badge');
  if ((s.total ?? 0) > 0) {
    badge.textContent = s.total;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  // Run table
  const tbody = document.getElementById('stats-tbody');
  const empty = document.getElementById('stats-empty');
  tbody.innerHTML = '';
  if (runs.length === 0) {
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    runs.forEach(run => {
      const tr = document.createElement('tr');
      const shortSess = (run.session_id || '-').slice(0, 8) + '…';
      const elapsed   = fmtElapsedMs(run.elapsed_ms ?? 0);
      const uid       = escHtml(run.user_id || '-');
      const rt        = escHtml(run.runtime || 'web');
      tr.innerHTML =
        `<td><span class="rt-badge ${rt}">${rt}</span></td>` +
        `<td style="color:var(--muted);font-size:.78rem">${uid}</td>` +
        `<td style="font-family:monospace;font-size:.75rem;color:var(--muted)">${escHtml(shortSess)}</td>` +
        `<td style="color:var(--text)">${escHtml(elapsed)}</td>`;
      tbody.appendChild(tr);
    });
  }

  // Timestamp
  document.getElementById('stats-ts').textContent =
    '更新于 ' + new Date().toLocaleTimeString('zh-CN');
}

function fmtElapsedMs(ms) {
  if (ms < 1000) return `${ms}ms`;
  if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${m}m ${s}s`;
}

function openStatsPanel() {
  if (!S.token) { toast('请先连接服务器', 'err'); return; }
  document.getElementById('stats-overlay').classList.remove('hidden');
  statsLoad();
  _statsTimer = setInterval(statsLoad, 10000);
}

function closeStatsPanel() {
  document.getElementById('stats-overlay').classList.add('hidden');
  clearInterval(_statsTimer);
  _statsTimer = null;
}

// ══════════════════════════════════════════════════════════════════════
//  Bootstrap
// ══════════════════════════════════════════════════════════════════════
(async function boot() {
  initTheme();
  initSidebar();
  loadSaved();

  // Try to auto-reconnect using persisted token
  const savedToken = localStorage.getItem('se_token');
  const savedUser  = localStorage.getItem('se_user');
  if (savedToken && savedUser) {
    S.token  = savedToken;
    S.userId = savedUser;
    S.url    = window.location.origin;
    try {
      await enterApp(false);
      // success — skip showing the modal
    } catch (e) {
      if (e && e.status === 401) {
        // Token expired — clear and fall through to login modal
        localStorage.removeItem('se_token');
        localStorage.removeItem('se_user');
        S.token = ''; S.userId = '';
      }
      // show login modal (already visible by default)
    }
  }

  // ── Event listeners ────────────────────────────────────────────────
  document.getElementById('btn-connect').addEventListener('click', connect);
  document.getElementById('btn-cancel').addEventListener('click', () =>
    document.getElementById('overlay').classList.add('hidden'));
  document.getElementById('btn-settings').addEventListener('click', () =>
    document.getElementById('overlay').classList.remove('hidden'));
  document.getElementById('btn-new').addEventListener('click', newSession);
  document.getElementById('btn-new-s').addEventListener('click', newSession);
  document.getElementById('btn-theme').addEventListener('click', toggleTheme);
  document.getElementById('btn-sidebar').addEventListener('click', toggleSidebar);
  document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebarOnMobile);

  document.getElementById('f-code').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

  // 用户手动上滚时暂停自动跟底；滚回底部（≤80px）时恢复
  document.getElementById('msgs').addEventListener('scroll', () => {
    const m = document.getElementById('msgs');
    autoScroll = m.scrollHeight - m.scrollTop - m.clientHeight < 80;
  }, { passive: true });

  const ta = document.getElementById('ta');
  document.getElementById('btn-send').addEventListener('click', () => {
    const msg = ta.value.trim();
    if (!msg || !S.sessionId) return;
    ta.value = ''; autoH(ta);
    if (S.busy) {
      const row = addQueuedUserBubble(msg);
      S.queue.push({ msg, row });
      updateQueueBadge();
    } else {
      sendMessage(msg);
    }
  });
  document.getElementById('btn-stop').addEventListener('click', () => {
    if (S.abortCtrl) S.abortCtrl.abort();
    S.queue.forEach(item => item.row.remove());
    S.queue = [];
    updateQueueBadge();
    // 取消所有正在运行的子任务
    if (S.activeSubagentTaskIds.size > 0) {
      for (const tid of S.activeSubagentTaskIds) {
        fetch(`${S.url}/api/subtask/${tid}/cancel`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${S.token}` },
        }).catch(() => {});
      }
    }
  });
  document.getElementById('queue-clear').addEventListener('click', () => {
    S.queue.forEach(item => item.row.remove());
    S.queue = [];
    updateQueueBadge();
  });
  let composing = false;
  ta.addEventListener('compositionstart', () => { composing = true; });
  ta.addEventListener('compositionend',   () => { composing = false; });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !composing) { e.preventDefault(); document.getElementById('btn-send').click(); }
  });
  ta.addEventListener('input', () => autoH(ta));

  const fi = document.getElementById('file-input');
  document.getElementById('btn-upload').addEventListener('click', () => {
    if (!S.sessionId) { toast('请先连接服务器', 'err'); return; }
    fi.click();
  });
  fi.addEventListener('change', () => { for (const f of fi.files) uploadFile(f); fi.value = ''; });

  const m = msgs();
  m.addEventListener('dragover', e => { e.preventDefault(); m.classList.add('drag-over'); });
  m.addEventListener('dragleave', () => m.classList.remove('drag-over'));
  m.addEventListener('drop', e => {
    e.preventDefault(); m.classList.remove('drag-over');
    const files = [...e.dataTransfer.files];
    if (!files.length) return;
    if (!S.sessionId) { toast('请先连接服务器', 'err'); return; }
    for (const f of files) uploadFile(f);
  });

  // 点击图片：新标签页查看原图
  m.addEventListener('click', e => {
    if (e.target.tagName === 'IMG' && (e.target.classList.contains('msg-img') || e.target.closest('.bubble-text'))) {
      window.open(e.target.src, '_blank');
    }
  });

  // ── Cron history panel ─────────────────────────────────────────────
  document.getElementById('btn-hist').addEventListener('click', openHistPanel);
  document.getElementById('btn-hist-close').addEventListener('click', closeHistPanel);
  document.getElementById('btn-hist-refresh').addEventListener('click', () => { HIST.page = 1; histLoad(); });
  document.getElementById('btn-hist-prev').addEventListener('click', () => {
    if (HIST.page > 1) { HIST.page--; histLoad(); }
  });
  document.getElementById('btn-hist-next').addEventListener('click', () => {
    const totalPages = Math.max(1, Math.ceil(HIST.total / HIST.pageSize));
    if (HIST.page < totalPages) { HIST.page++; histLoad(); }
  });
  document.getElementById('hist-q').addEventListener('input', histQChange);
  // clicking the backdrop closes the panel
  document.getElementById('hist-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('hist-overlay')) closeHistPanel();
  });

  // Stats panel
  document.getElementById('btn-stats').addEventListener('click', openStatsPanel);
  document.getElementById('btn-stats-close').addEventListener('click', closeStatsPanel);
  document.getElementById('btn-stats-refresh').addEventListener('click', statsLoad);
  document.getElementById('stats-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('stats-overlay')) closeStatsPanel();
  });

  // 后台每 30s 刷新 header badge（面板关闭时也更新）
  setInterval(() => { if (S.token) statsLoad(); }, 30000);

  if (window.marked) {
    marked.setOptions({ breaks: true, gfm: true });
  }
})();
</script>
